<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiB2aWV3Qm94PSIwIDAgNTEyIDUxMiI+PHJlY3Qgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIGZpbGw9IiMwMDAiLz48Y2lyY2xlIGN4PSIyNTYiIGN5PSIyNTYiIHI9IjEyMCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjMyIi8+PC9zdmc+">
    
    <title>Terminal PDV PIX • 1:1 Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        primary: 'var(--primary-color)',
                        terminalBg: 'var(--bg-color)'
                    } 
                } 
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        
        :root { 
            --primary-color: #10b981; 
            --bg-color: #18181b;
            --primary-glow: rgba(16, 185, 129, 0.15);
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Inter', sans-serif; overflow: hidden; 
            user-select: none; -webkit-user-select: none; 
            background-color: #000000;
        }

        /* Layout Dual Frame 1:1 */
        .app-wrapper {
            display: flex;
            flex-direction: column; 
            width: 100vw;
            height: 100vh;
            padding: 8px;
            gap: 8px;
            box-sizing: border-box;
            align-items: center;
            justify-content: center;
        }

        @media (orientation: landscape) {
            .app-wrapper { flex-direction: row; padding: 12px; gap: 12px; }
        }

        .square-frame {
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 100%;
            max-height: calc(50vh - 12px); /* Vertical */
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
        }

        @media (orientation: landscape) {
            .square-frame {
                max-width: calc(50vw - 20px);
                max-height: 100%;
            }
        }

        .frame-pdv { background-color: var(--bg-color); transition: all 0.5s ease; }
        .frame-external { background-color: #2c4e64; }

        .mode-payment .frame-pdv { box-shadow: inset 0 0 60px var(--primary-glow); }

        /* Keypad compacto para 1:1 */
        .keypad-btn { 
            background: transparent; border-radius: 999px; transition: all 0.2s; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.4rem; font-weight: 400; cursor: pointer; height: 100%;
        }
        .keypad-btn:active { background: rgba(255, 255, 255, 0.1); transform: scale(0.9); }
        .btn-enter { background: #ffffff; color: #000000; font-weight: 700; }
        
        .qr-wrapper { 
            background: #ffffff; padding: 12px; border-radius: 20px; display: inline-block; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: scale(0.8); 
            animation: qrEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        @keyframes qrEntry { to { transform: scale(0.9); opacity: 1; } }

        .minimal-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 4px 0; font-size: 0.8rem; outline: none; transition: all 0.3s; color: white; }
        .minimal-input:focus { border-bottom-color: var(--primary-color); }
        select.minimal-input option { background-color: #18181b; color: white; }

        /* Overlays adaptados ao frame */
        .view-overlay { background: var(--bg-color); z-index: 200; position: absolute; inset: 0; display: none; flex-direction: column; padding: 16px; overflow-y: auto; }
        .view-overlay.active { display: flex; }
        .custom-scroll::-webkit-scrollbar { width: 0px; }

        .shortcut-view-mode {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 8px;
        }
        .shortcut-edit-mode { background: rgba(255,255,255,0.05); border: 1px solid var(--primary-color); padding: 12px; border-radius: 16px; margin-bottom: 8px; }

        .cart-list-main { max-height: 80px; overflow-y: auto; width: 100%; text-align: center; margin-bottom: 4px; }
        
        #screensaver { background-color: #000000; z-index: 1000; display: none; opacity: 0; transition: opacity 1s; border-radius: 24px; }
        #screensaver.active { display: flex; opacity: 1; }
    </style>
</head>
<body id="app-body" onclick="initAudioAndFullscreen()">
  
<div class="app-wrapper">

  <!-- FRAME 1 -->
  <div class="square-frame frame-external p-0">
    <iframe src="pix.html" style="width:100%; height:100%; border:none; border-radius: 24px;"></iframe>
  </div>

  <!-- FRAME 2 -->
  <div class="square-frame frame-external p-0">
    <iframe src="anuncio.html" style="width:100%; height:100%; border:none; border-radius: 24px;"></iframe>
  </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyD3E7c_4jbnLJCGCapM5L8rta6AXVHvZgs", authDomain: "indisponivel-rrehfe.firebaseapp.com", databaseURL: "https://indisponivel-rrehfe.firebaseio.com", projectId: "indisponivel-rrehfe", storageBucket: "indisponivel-rrehfe.firebasestorage.app", messagingSenderId: "880210924564", appId: "1:880210924564:web:fd565cdb0e4f04cd7ac301" };
    const safeAppId = 'pdv-ultra-minimal';
    
    let db, auth, lastPixString = "";
    let currentDigits = "", salesData = [], cartTotal = 0, cartItems = [];
    let unsubscribePayment = null, pdvMode = 'COMMAND'; 

    let terminalConfig = {
        terminalName: "CAIXA", pixKey: "", mpApiKey: "", theme: "dark", color: "#10b981", bgColor: "#18181b", voice: "on", lastClosed: 0, kbType: "virtual", whatsapp: "", wifiSSID: "", wifiPass: "", dailyGoal: 1000, shortcuts: {} 
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(f = 440, d = 0.05, v = 0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.value = f; g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
    }

    const initFirebase = async () => {
        const app = initializeApp(firebaseConfig);
        db = getDatabase(app); auth = getAuth(app);
        try { await signInAnonymously(auth); } catch (e) {}
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main`), (snap) => {
                    const data = snap.val();
                    if (data) { 
                        terminalConfig = { ...terminalConfig, ...data }; 
                        if (!terminalConfig.shortcuts) terminalConfig.shortcuts = {};
                        applyThemeSettings(); updateUIFromConfig(); 
                    } 
                });
                onValue(ref(db, `artifacts/${safeAppId}/public/data/sales`), (snap) => {
                    salesData = []; snap.forEach(child => { salesData.push({ id: child.key, ...child.val() }); });
                    salesData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    renderSales();
                });
                document.getElementById('status-dot').className = "w-1 h-1 bg-primary rounded-full animate-pulse";
            }
        });
    };

    window.initAudioAndFullscreen = () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => {});
        }
    };

    window.toggleFullscreen = () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    };

    window.previewTheme = () => {
        const c = document.getElementById('input-color')?.value || '#10b981';
        const b = document.getElementById('input-bg')?.value || '#18181b';
        document.documentElement.style.setProperty('--primary-color', c);
        document.documentElement.style.setProperty('--bg-color', b);
    };

    function applyThemeSettings() {
        const c = terminalConfig.color || '#10b981', b = terminalConfig.bgColor || '#18181b';
        document.documentElement.style.setProperty('--primary-color', c);
        document.documentElement.style.setProperty('--bg-color', b);
        const r = parseInt(c.slice(1,3), 16), g = parseInt(c.slice(3,5), 16), bl = parseInt(c.slice(5,7), 16);
        document.documentElement.style.setProperty('--primary-glow', `rgba(${r}, ${g}, ${bl}, 0.15)`);
    }

    window.pressKey = (key) => {
        playBeep(600, 0.04, 0.05); if (navigator.vibrate) navigator.vibrate(20);
        if (key === 'back') { 
            if ((pdvMode === 'PAYMENT' || cartTotal > 0) && currentDigits === "") { resetApp(); return; }
            currentDigits = currentDigits.slice(0, -1); 
        } 
        else if (key === 'enter') { handleAction(); return; } 
        else {
            if (pdvMode === 'COMMAND') { if (currentDigits.length < 3) currentDigits += key; } 
            else { if (key === '0' && currentDigits === "") { resetApp(); return; } if (currentDigits.length < 8) currentDigits += key; }
        }
        updateDisplay();
    };

    function updateDisplay() {
        const vB = document.getElementById('display-value'), cB = document.getElementById('display-currency'), l = document.getElementById('instruction-label'), h = document.getElementById('back-hint');
        if (pdvMode === 'COMMAND') {
            document.getElementById('pdv-frame').classList.remove('mode-payment'); cB.classList.add('hidden');
            vB.textContent = currentDigits || "0"; vB.className = "text-[4.5rem] font-bold tracking-tighter text-white";
            const c = currentDigits; h.style.opacity = "0";
            if (terminalConfig.shortcuts && terminalConfig.shortcuts[c]) {
                const s = terminalConfig.shortcuts[c]; l.textContent = `ADD: ${s.desc.toUpperCase()}`; vB.classList.add('text-primary');
            } else if (c === '' || c === '0') { l.textContent = cartTotal > 0 ? "ENTER FINALIZA" : "ENTER VENDA MANUAL"; }
            else l.textContent = "CÓDIGO PDV";
            if (cartTotal > 0 && currentDigits === "") { h.textContent = "Apagar p/ Limpar"; h.style.opacity = "1"; }
        } else {
            document.getElementById('pdv-frame').classList.add('mode-payment'); cB.classList.remove('hidden');
            const v = currentDigits === "" ? 0 : parseInt(currentDigits);
            vB.textContent = (v / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            vB.className = "text-[3.2rem] font-black tracking-tighter text-primary";
            l.textContent = "VALOR MANUAL"; h.style.opacity = (currentDigits === "") ? "1" : "0";
        }
    }

    function handleAction() {
        if (pdvMode === 'COMMAND') {
            const code = currentDigits === "" ? "0" : currentDigits; currentDigits = "";
            if (terminalConfig.shortcuts && terminalConfig.shortcuts[code]) {
                const s = terminalConfig.shortcuts[code];
                if (s.type === 'venda') {
                    cartTotal += parseFloat(s.value); cartItems.push({ desc: s.desc, amount: parseFloat(s.value) });
                    playBeep(880, 0.1, 0.2); updateCartUI(); updateDisplay(); return;
                } else {
                    if (s.funcType === 'config') toggleSettings();
                    else if (s.funcType === 'caixa') { document.getElementById('view-closing').classList.add('active'); renderSales(); }
                    else if (s.funcType === 'wifi') showWifi(s.ssid, s.pass);
                    else if (s.funcType === 'contato') showSupport(s.whatsapp);
                    return;
                }
            }
            if (code === '0') { if (cartTotal > 0) { processSalePIX(cartTotal); } else { pdvMode = 'PAYMENT'; playBeep(880, 0.1); } }
            else playBeep(150, 0.2); updateDisplay();
        } else {
            const v = currentDigits === "" ? 0 : parseInt(currentDigits);
            if (v <= 0) return;
            const a = v / 100; cartItems.push({ desc: "Venda Manual", amount: a });
            cartTotal += a; processSalePIX(cartTotal);
        }
    }

    window.toggleSettings = () => {
        const v = document.getElementById('view-settings');
        if(v.classList.contains('active')) v.classList.remove('active');
        else {
            const g = (id) => document.getElementById(id);
            if (g('input-terminal-name')) g('input-terminal-name').value = terminalConfig.terminalName || "";
            if (g('input-daily-goal')) g('input-daily-goal').value = terminalConfig.dailyGoal || "";
            if (g('input-pix-key')) g('input-pix-key').value = terminalConfig.pixKey || "";
            if (g('input-api-key')) g('input-api-key').value = terminalConfig.mpApiKey || "";
            if (g('input-whatsapp')) g('input-whatsapp').value = terminalConfig.whatsapp || "";
            if (g('input-wifi-ssid')) g('input-wifi-ssid').value = terminalConfig.wifiSSID || "";
            if (g('input-wifi-pass')) g('input-wifi-pass').value = terminalConfig.wifiPass || "";
            if (g('input-bg')) g('input-bg').value = terminalConfig.bgColor || "#18181b";
            if (g('input-color')) g('input-color').value = terminalConfig.color || "#10b981";
            if (g('input-kb-type')) g('input-kb-type').value = terminalConfig.kbType || "virtual";
            renderShortcutsConfig();
            v.classList.add('active');
        }
    };

    window.saveSettings = async () => {
        const shortcuts = {};
        document.querySelectorAll('.shortcut-item').forEach(item => {
            const t = item.querySelector('[data-key="trigger"]')?.value;
            const type = item.querySelector('[data-key="type"]')?.value;
            const desc = item.querySelector('[data-key="desc"]')?.value;
            if (t) {
                const s = { type, desc };
                if (type === 'venda') s.value = parseFloat(item.querySelector('[data-key="value"]')?.value || 0);
                else {
                    s.funcType = item.querySelector('[data-key="funcType"]')?.value;
                    s.ssid = item.querySelector('[data-key="ssid"]')?.value;
                    s.pass = item.querySelector('[data-key="pass"]')?.value;
                    s.whatsapp = item.querySelector('[data-key="whatsapp"]')?.value;
                }
                shortcuts[t] = s;
            }
        });
        const gV = (id) => document.getElementById(id)?.value || "";
        const cfg = { ...terminalConfig, terminalName: gV('input-terminal-name'), dailyGoal: parseFloat(gV('input-daily-goal')) || 0, pixKey: gV('input-pix-key'), mpApiKey: gV('input-api-key'), whatsapp: gV('input-whatsapp'), wifiSSID: gV('input-wifi-ssid'), wifiPass: gV('input-wifi-pass'), color: gV('input-color'), bgColor: gV('input-bg'), kbType: gV('input-kb-type'), shortcuts: shortcuts };
        if (db && auth.currentUser) { await set(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main`), cfg); resetApp(); showMessage("Sincronizado!"); }
    };

    function updateCartUI() {
        const b = document.getElementById('main-total-badge'), vE = document.getElementById('main-cart-total-val'), l = document.getElementById('main-cart-list');
        if (cartTotal > 0) {
            b.style.opacity = "1"; b.style.transform = "scale(0.85)"; vE.textContent = cartTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            l.innerHTML = cartItems.slice(-2).map(i => `<div class="item-row flex justify-between items-center text-[7px] font-bold uppercase tracking-tight text-primary/80 truncate"><span>${i.desc}</span><span>R$ ${i.amount.toFixed(2)}</span></div>`).join('');
        } else { b.style.opacity = "0"; l.innerHTML = ""; }
    }

    async function processSalePIX(amount) {
        document.getElementById('view-pix').classList.add('active');
        document.getElementById('pix-amount-label').textContent = amount.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        lastPixString = "00020101021126580014BR.GOV.BCB.PIX0136"+(terminalConfig.pixKey || "pix")+"52040000530398654"+amount.toFixed(2).length.toString().padStart(2,'0')+amount.toFixed(2)+"5802BR5903PDV6009SAO PAULO62070503***6304";
        document.getElementById('pix-qr-box').innerHTML = "";
        new QRCode(document.getElementById('pix-qr-box'), { text: lastPixString, width: 200, height: 200 });
    }

    window.copyPixCode = () => { const e = document.createElement('textarea'); e.value = lastPixString; document.body.appendChild(e); e.select(); document.execCommand('copy'); document.body.removeChild(e); showMessage("Copiado!"); };

    function registerSale(amount) {
        push(ref(db, `artifacts/${safeAppId}/public/data/sales`), { amount: amount, timestamp: new Date().toISOString(), items: cartItems });
        confetti({ particleCount: 80, origin: { y: 0.2 } });
        resetApp(); document.getElementById('view-success').classList.add('active');
        setTimeout(resetApp, 2500);
    }

    window.addShortcutUI = () => { renderShortcutRow(Date.now(), null, true); };
    function renderShortcutRow(id, s, isEdit) {
        const container = document.getElementById('shortcuts-config-list');
        if (isEdit) {
            const h = `<div class="shortcut-item shortcut-edit-mode" id="sc-${id}"><div class="grid grid-cols-7 gap-1 items-center"><input type="text" placeholder="CÓD" class="col-span-1 minimal-input text-center text-primary" data-key="trigger" value="${s ? s.trigger : ''}"><select class="col-span-2 minimal-input text-[8px]" data-key="type" onchange="updateShortcutFields('${id}')"><option value="venda" ${s?.type === 'venda' ? 'selected' : ''}>Venda</option><option value="funcao" ${s?.type === 'funcao' ? 'selected' : ''}>Função</option></select><input type="text" placeholder="DESC" class="col-span-3 minimal-input text-[9px]" data-key="desc" value="${s ? s.desc : ''}"><button onclick="document.getElementById('sc-${id}').remove()" class="col-span-1 text-red-500"><i data-lucide="trash-2" size="14"></i></button></div><div id="fields-${id}" class="mt-2"></div></div>`;
            const tD = document.createElement('div'); tD.innerHTML = h;
            const ex = document.getElementById(`sc-${id}`);
            if (ex) container.replaceChild(tD.firstElementChild, ex); else container.insertAdjacentElement('beforeend', tD.firstElementChild);
            updateShortcutFields(id, s);
        } else {
            const h = `<div class="shortcut-item shortcut-view-mode" id="sc-${id}" onclick="switchShortcutToEdit('${id}', ${JSON.stringify(s).replace(/"/g, '&quot;')})"><span class="text-[8px] font-black text-primary">${s.trigger}</span><span class="text-[8px] uppercase truncate px-2">${s.desc}</span><i data-lucide="edit-3" size="10"></i><input type="hidden" data-key="trigger" value="${s.trigger}"><input type="hidden" data-key="type" value="${s.type}"><input type="hidden" data-key="desc" value="${s.desc}"><div class="hidden" id="fields-${id}"></div></div>`;
            const tD = document.createElement('div'); tD.innerHTML = h;
            const ex = document.getElementById(`sc-${id}`);
            if (ex) container.replaceChild(tD.firstElementChild, ex); else container.insertAdjacentElement('beforeend', tD.firstElementChild);
            const f = document.getElementById(`fields-${id}`);
            if (s.type === 'venda') f.innerHTML = `<input type="hidden" data-key="value" value="${s.value}">`;
            else f.innerHTML = `<input type="hidden" data-key="funcType" value="${s.funcType}"><input type="hidden" data-key="ssid" value="${s.ssid || ''}"><input type="hidden" data-key="pass" value="${s.pass || ''}"><input type="hidden" data-key="whatsapp" value="${s.whatsapp || ''}">`;
        }
        lucide.createIcons();
    }

    window.switchShortcutToEdit = (id, data) => { renderShortcutRow(id, { ...data, trigger: data.trigger }, true); };
    window.updateShortcutFields = (id, ex = null) => {
        const c = document.getElementById(`fields-${id}`); const t = document.querySelector(`#sc-${id} [data-key="type"]`).value;
        if (!c) return;
        if (t === 'venda') c.innerHTML = `<input type="number" placeholder="Preço" class="minimal-input text-[8px]" data-key="value" value="${ex?.value || ''}">`;
        else c.innerHTML = `<select class="minimal-input text-[8px]" data-key="funcType" onchange="updateSubSub('${id}')"><option value="config" ${ex?.funcType === 'config' ? 'selected' : ''}>Ajustes</option><option value="caixa" ${ex?.funcType === 'caixa' ? 'selected' : ''}>Caixa</option><option value="wifi" ${ex?.funcType === 'wifi' ? 'selected' : ''}>Wi-Fi</option><option value="contato" ${ex?.funcType === 'contato' ? 'selected' : ''}>Contato</option></select><div id="subsub-${id}" class="mt-1"></div>`;
        updateSubSub(id, ex);
    };

    window.updateSubSub = (id, ex = null) => {
        const s = document.getElementById(`subsub-${id}`); if (!s) return;
        const f = document.querySelector(`#sc-${id} [data-key="funcType"]`)?.value; s.innerHTML = "";
        if (f === 'wifi') s.innerHTML = `<input type="text" placeholder="SSID" class="minimal-input text-[7px]" data-key="ssid" value="${ex?.ssid || ''}"><input type="text" placeholder="Pass" class="minimal-input text-[7px]" data-key="pass" value="${ex?.pass || ''}">`;
        if (f === 'contato') s.innerHTML = `<input type="text" placeholder="WhatsApp" class="minimal-input text-[7px]" data-key="whatsapp" value="${ex?.whatsapp || ''}">`;
    };

    window.resetApp = () => { 
        if(unsubscribePayment) unsubscribePayment(); 
        document.querySelectorAll('.view-overlay').forEach(v => v.classList.remove('active')); 
        pdvMode = 'COMMAND'; currentDigits = ""; cartTotal = 0; cartItems = []; updateCartUI(); updateDisplay(); 
    };

    function showWifi(ssid, pass) { document.getElementById('view-wifi').classList.add('active'); document.getElementById('wifi-ssid-val').textContent = ssid; document.getElementById('wifi-qr-box').innerHTML=""; new QRCode(document.getElementById('wifi-qr-box'), { text: `WIFI:S:${ssid};P:${pass};;`, width: 200, height: 200 }); }
    function showSupport(num) { document.getElementById('view-support').classList.add('active'); document.getElementById('whatsapp-num-val').textContent = num; document.getElementById('whatsapp-qr').innerHTML=""; new QRCode(document.getElementById('whatsapp-qr'), { text: `https://wa.me/${num}`, width: 200, height: 200 }); }

    function updateUIFromConfig() { document.getElementById('terminal-name-label').textContent = terminalConfig.terminalName || "ONLINE"; }
    function renderSales() {
        const l = document.getElementById('sales-list'); if(!l) return; l.innerHTML = ""; let t = 0;
        salesData.forEach(s => { if(new Date(s.timestamp).getTime() > terminalConfig.lastClosed) { t += s.amount; l.innerHTML += `<div class="bg-white/5 p-2 rounded-lg flex justify-between"><span>PIX</span><span class="font-bold">R$ ${s.amount.toFixed(2)}</span></div>`; } });
        document.getElementById('closing-total').textContent = t.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
    }

    if ('getBattery' in navigator) {
        navigator.getBattery().then(bat => {
            const up = () => { document.getElementById('battery-level').textContent = Math.round(bat.level * 100) + "%"; };
            up(); bat.onlevelchange = up;
        });
    }

    window.closeShift = () => { set(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main/lastClosed`), Date.now()); resetApp(); showMessage("Turno Zerado"); };
    function showMessage(t) { const b = document.getElementById('message-box'); document.getElementById('message-text').textContent = t; b.style.opacity = "1"; setTimeout(() => b.style.opacity = "0", 2500); }

    setInterval(() => { const d = new Date(); document.getElementById('clock').textContent = d.toLocaleTimeString('pt-BR'); }, 1000);
    window.addEventListener('load', () => { lucide.createIcons(); initFirebase(); });
</script>
</body>
</html>
