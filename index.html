<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galeria de Anúncios Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }

        #progress-bar {
            position: absolute; top: 0; left: 0;
            height: 4px; background-color: #ffffff;
            width: 0%; z-index: 50;
        }

        .ad-image {
            width: 100%; height: 100%;
            object-fit: contain; 
            background-color: #000;
        }

        #admin-panel {
            display: none;
            z-index: 100;
            background: rgba(0, 0, 0, 0.98);
        }

        .fade-transition {
            transition: opacity 1s ease-in-out;
        }
    </style>
</head>
<body class="flex items-center justify-center select-none">

    <div id="progress-bar"></div>

    <!-- Botão de Configuração -->
    <button id="admin-toggle-btn" class="absolute top-4 right-4 z-[60] p-4 text-white/10 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>

    <!-- Painel Admin -->
    <div id="admin-panel" class="absolute inset-0 p-8 flex flex-col text-white overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black uppercase tracking-tighter">Gestão de Anúncios</h2>
            <button id="admin-close-btn" class="bg-white/10 p-2 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        
        <!-- Secção de Upload Direto -->
        <div class="bg-white/5 p-6 rounded-3xl border border-white/10 mb-6">
            <h3 class="text-xs font-black uppercase tracking-widest mb-4 text-zinc-400">Upload de Imagem</h3>
            <div class="flex flex-col sm:flex-row gap-4">
                <input type="file" id="image-file" accept="image/*" class="flex-grow text-sm text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-black file:bg-white file:text-black hover:file:bg-zinc-200">
                <button id="upload-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-2 px-6 rounded-full text-xs uppercase tracking-widest transition-all">
                    Enviar Ficheiro
                </button>
            </div>
        </div>

        <p class="text-zinc-500 text-sm mb-2 font-medium uppercase tracking-widest">Links Atuais (URLs)</p>
        <textarea id="links-input" class="flex-grow min-h-[200px] bg-zinc-900 border border-white/10 rounded-3xl p-6 text-sm font-mono focus:border-white/30 outline-none transition-all" placeholder="Podes colar links externos aqui também..."></textarea>
        
        <div class="mt-6 flex gap-4">
            <button id="save-btn" class="flex-grow bg-white text-black font-black py-5 rounded-2xl uppercase tracking-widest text-xs hover:bg-zinc-200 disabled:opacity-50">
                Guardar Configurações
            </button>
        </div>
        <p id="status-msg" class="text-center mt-4 text-xs font-bold uppercase tracking-widest text-zinc-600"></p>
    </div>

    <!-- Container da Galeria -->
    <div id="ad-container" class="relative w-full h-full flex items-center justify-center overflow-hidden">
        <div id="loader" class="text-white/20 uppercase tracking-[0.3em] text-[10px] font-bold text-center px-4">
            A ligar ao Supabase...
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="module">
        const SUPABASE_URL = 'https://xhznfkqwqzzqbigrlvux.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_mlr7SYljs0_TVrD58PBnwQ_SP0jSQOt';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let ads = [];
        let currentIndex = 0;
        let timer = null;
        let pollingInterval = null;
        const INTERVALO_TRANSICAO = 5000;
        const INTERVALO_POLLING = 20000; 

        async function fetchAds() {
            try {
                const { data, error } = await supabase
                    .from('configuracoes')
                    .select('links')
                    .eq('id', 1)
                    .single();

                if (error) throw error;

                if (data && data.links) {
                    const novosLinks = Array.isArray(data.links) ? data.links : JSON.parse(data.links || "[]");
                    if (JSON.stringify(novosLinks) !== JSON.stringify(ads)) {
                        updateAdsList(novosLinks);
                    }
                }
            } catch (err) {
                console.error("Erro ao buscar dados:", err.message);
            }
        }

        async function init() {
            await fetchAds();
            pollingInterval = setInterval(fetchAds, INTERVALO_POLLING);
        }

        function updateAdsList(linksArray) {
            if (linksArray.length === 0) {
                 document.getElementById('loader').innerHTML = "Sem anúncios. Abre o painel para adicionar.";
                 return;
            }
            ads = linksArray;
            document.getElementById('links-input').value = ads.join('\n');
            document.getElementById('loader').classList.add('hidden');
            if (!timer) {
                currentIndex = 0;
                startCarousel();
            }
        }

        function startCarousel() {
            if (timer) clearTimeout(timer);
            showAd();
        }

        function showAd() {
            if (ads.length === 0) return;
            const url = ads[currentIndex];
            const container = document.getElementById('ad-container');
            
            const nextSlide = document.createElement('div');
            nextSlide.className = 'absolute inset-0 fade-transition opacity-0 flex items-center justify-center';
            nextSlide.innerHTML = `<img src="${url}" class="ad-image" onerror="handleImgError(this)">`;
            
            const prevSlide = container.querySelector('.opacity-100');
            if (prevSlide) {
                prevSlide.classList.replace('opacity-100', 'opacity-0');
                setTimeout(() => { if (prevSlide.parentNode) prevSlide.remove(); }, 1000);
            }

            container.appendChild(nextSlide);
            setTimeout(() => { if (nextSlide) nextSlide.classList.replace('opacity-0', 'opacity-100'); }, 50);

            animateProgressBar();
            currentIndex = (currentIndex + 1) % ads.length;
            timer = setTimeout(showAd, INTERVALO_TRANSICAO);
        }

        function animateProgressBar() {
            const pb = document.getElementById('progress-bar');
            pb.style.transition = 'none';
            pb.style.width = '0%';
            setTimeout(() => {
                pb.style.transition = `width ${INTERVALO_TRANSICAO}ms linear`;
                pb.style.width = '100%';
            }, 50);
        }

        window.handleImgError = (img) => {
            img.src = 'https://via.placeholder.com/1080x1920?text=Imagem+Indisponivel';
        };

        const toggleAdmin = () => {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
        };

        const saveToSupabase = async () => {
            const btn = document.getElementById('save-btn');
            const status = document.getElementById('status-msg');
            const links = document.getElementById('links-input').value.split('\n').map(l => l.trim()).filter(l => l.length > 5);
            
            if (links.length === 0) return alert("Insira pelo menos um link.");

            btn.disabled = true;
            status.innerText = "A GUARDAR...";

            const { error } = await supabase.from('configuracoes').update({ links }).eq('id', 1);

            if (error) {
                status.innerText = "ERRO AO GUARDAR.";
            } else {
                status.innerText = "ATUALIZADO!";
                ads = links;
                setTimeout(() => { status.innerText = ""; toggleAdmin(); }, 1500);
            }
            btn.disabled = false;
        };

        // LÓGICA DE UPLOAD DE FICHEIRO MELHORADA
        const uploadFile = async () => {
            const fileInput = document.getElementById('image-file');
            const btn = document.getElementById('upload-btn');
            const status = document.getElementById('status-msg');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                return alert("Seleciona um ficheiro primeiro.");
            }

            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${fileExt}`;
            const filePath = fileName;

            btn.disabled = true;
            btn.innerText = "A ENVIAR...";

            try {
                // 1. Upload para o bucket 'anuncios'
                const { data, error: uploadError } = await supabase.storage
                    .from('anuncios')
                    .upload(filePath, file);

                if (uploadError) {
                    // Se o erro for de RLS, dar instrução clara
                    if (uploadError.message && uploadError.message.includes('row-level security policy')) {
                        throw new Error("Erro de Permissão (RLS): Tens de executar o script SQL de configuração no teu painel do Supabase para permitir uploads públicos.");
                    }
                    throw uploadError;
                }

                // 2. Obter URL pública
                const { data: { publicUrl } } = supabase.storage
                    .from('anuncios')
                    .getPublicUrl(filePath);

                // 3. Adicionar o novo link ao campo de texto
                const currentLinks = document.getElementById('links-input').value;
                document.getElementById('links-input').value = (currentLinks ? currentLinks.trim() + '\n' : '') + publicUrl;
                
                alert("Imagem enviada com sucesso! Agora clica em 'Guardar Configurações' para ativar.");
                fileInput.value = "";
            } catch (err) {
                console.error("Erro no upload:", err);
                alert(err.message || "Erro desconhecido ao enviar imagem.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar Ficheiro";
            }
        };

        document.getElementById('admin-toggle-btn').addEventListener('click', toggleAdmin);
        document.getElementById('admin-close-btn').addEventListener('click', toggleAdmin);
        document.getElementById('save-btn').addEventListener('click', saveToSupabase);
        document.getElementById('upload-btn').addEventListener('click', uploadFile);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                window.location.href = encodeURI('cobrança.html');
            }
        });

        document.body.onclick = (e) => {
            if (document.getElementById('admin-panel').contains(e.target) || e.target.closest('button')) return;
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
        };

        init();
    </script>
</body>
</html>
