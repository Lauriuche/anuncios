<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#18181b" id="meta-theme-color">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiB2aWV3Qm94PSIwIDAgNTEyIDUxMiI+PHJlY3Qgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIGZpbGw9IiMwMDAiLz48Y2lyY2xlIGN4PSIyNTYiIGN5PSIyNTYiIHI9IjEyMCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjMyIi8+PC9zdmc+">
    
    <title>Terminal PDV PIX • Pro Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: 'var(--primary-color)' } } }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        :root { --primary-color: #10b981; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; user-select: none; -webkit-user-select: none; transition: background-color 0.4s; }
        body { background-color: #18181b; color: #ffffff; }
        .terminal-container { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; transition: all 0.5s ease; }
        .mode-payment .terminal-container { box-shadow: inset 0 0 100px rgba(16, 185, 129, 0.1); }
        
        @media (min-width: 768px) {
            body { display: flex; align-items: center; justify-content: center; background-color: #09090b !important; }
            .terminal-container { max-width: 450px; height: 90vh; max-height: 850px; border-radius: 40px; overflow: hidden; border: 1px solid #27272a; }
        }

        .keypad-btn { background: transparent; border-radius: 999px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 400; cursor: pointer; }
        .keypad-btn:active { background: rgba(255, 255, 255, 0.1); transform: scale(0.9); }
        .btn-enter { background: #ffffff; color: #000000; font-weight: 700; }
        
        .qr-wrapper { 
            background: #ffffff; padding: 20px; border-radius: 28px; display: inline-block; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); transform: scale(0.9); 
            animation: qrEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        @keyframes qrEntry { to { transform: scale(1); opacity: 1; } }

        .minimal-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #3f3f46; padding: 8px 0; font-size: 1rem; outline: none; transition: border-color 0.3s; color: white; }
        .minimal-input:focus { border-bottom-color: var(--primary-color); }

        .view-overlay { background: #18181b; z-index: 20; position: absolute; inset: 0; }
        .custom-scroll::-webkit-scrollbar { width: 0px; }

        .shortcut-item { animation: slideIn 0.3s ease-out; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .cart-list-main { max-height: 140px; overflow-y: auto; width: 100%; text-align: center; margin-bottom: 15px; }
        .item-row { animation: itemEntry 0.4s ease-out forwards; }
        @keyframes itemEntry { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="md:p-6" id="app-body">

<div class="terminal-container">
    <!-- Feedback Box -->
    <div id="message-box" class="absolute top-10 left-1/2 -translate-x-1/2 bg-zinc-800 border border-zinc-700 text-white px-5 py-3 rounded-full text-xs font-medium flex items-center gap-3 shadow-2xl transition-all opacity-0 pointer-events-none z-[100]">
        <div id="msg-dot" class="w-1.5 h-1.5 bg-primary rounded-full"></div>
        <span id="message-text">Processando</span>
    </div>

    <!-- Status Bar -->
    <div class="px-8 pt-8 flex justify-between items-center z-10 relative">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-1.5 h-1.5 bg-zinc-500 rounded-full transition-colors duration-500"></div>
            <span id="terminal-name-label" class="text-[9px] font-bold tracking-[0.2em] uppercase opacity-60">OFFLINE</span>
        </div>
        <div class="flex items-center gap-4">
            <div id="battery-status" class="flex items-center gap-1.5 opacity-40">
                <span id="battery-level" class="text-[9px] font-bold">--%</span>
                <i data-lucide="battery" size="14"></i>
            </div>
            <button onclick="toggleSettings()" class="text-[10px] font-medium text-zinc-500 hover:text-white tracking-widest opacity-60">
                <span id="clock">00:00:00</span>
            </button>
        </div>
    </div>

    <!-- Main View -->
    <div class="flex-1 relative flex flex-col min-h-0 overflow-hidden">
        <div id="view-main" class="flex-1 flex flex-col p-6 view-transition">
            
            <div class="flex-1 flex flex-col items-center justify-center relative">
                
                <!-- Lista de itens detalhados do carrinho -->
                <div class="cart-list-main custom-scroll px-6 space-y-2" id="main-cart-list"></div>

                <!-- Badge do Total Acumulado -->
                <div id="main-total-badge" class="mb-4 opacity-0 transition-all scale-90">
                    <div class="bg-primary/20 text-primary border border-primary/20 px-6 py-2 rounded-full text-[13px] font-black tracking-widest uppercase">
                        TOTAL: R$ <span id="main-cart-total-val">0,00</span>
                    </div>
                </div>

                <span id="instruction-label" class="text-[11px] text-zinc-500 tracking-[0.4em] uppercase mb-4 opacity-40 text-center">AGUARDANDO CÓDIGO</span>
                
                <div class="flex items-baseline justify-center w-full px-4">
                    <span id="display-currency" class="hidden text-2xl font-light text-zinc-500 mr-2">R$</span>
                    <span id="display-value" class="text-[9rem] font-bold tracking-tighter leading-none transition-all duration-300">0</span>
                </div>
            </div>

            <!-- Keypad -->
            <div id="virtual-keypad" class="grid grid-cols-3 gap-y-4 gap-x-4 pb-8">
                <button onclick="pressKey('1')" class="keypad-btn h-16">1</button>
                <button onclick="pressKey('2')" class="keypad-btn h-16">2</button>
                <button onclick="pressKey('3')" class="keypad-btn h-16">3</button>
                <button onclick="pressKey('4')" class="keypad-btn h-16">4</button>
                <button onclick="pressKey('5')" class="keypad-btn h-16">5</button>
                <button onclick="pressKey('6')" class="keypad-btn h-16">6</button>
                <button onclick="pressKey('7')" class="keypad-btn h-16">7</button>
                <button onclick="pressKey('8')" class="keypad-btn h-16">8</button>
                <button onclick="pressKey('9')" class="keypad-btn h-16">9</button>
                <button onclick="pressKey('back')" class="keypad-btn h-16 text-zinc-500"><i data-lucide="delete" size="28"></i></button>
                <button onclick="pressKey('0')" class="keypad-btn h-16">0</button>
                <button onclick="pressKey('enter')" class="keypad-btn btn-enter h-16 rounded-3xl"><i data-lucide="arrow-right" size="32"></i></button>
            </div>
        </div>

        <!-- ECRÃ PIX -->
        <div id="view-pix" class="hidden absolute inset-0 view-overlay overflow-y-auto z-30">
            <div class="min-h-full flex flex-col items-center justify-center p-6 text-center">
                <div class="qr-wrapper mb-6"><div id="pix-qr-box"></div></div>
                <div class="mb-4">
                    <p class="text-zinc-500 text-[10px] uppercase opacity-60 mb-1">Pagamento via PIX</p>
                    <span class="text-4xl font-bold text-white tracking-tighter" id="pix-amount-label">R$ 0,00</span>
                </div>
                <div class="flex flex-col gap-3 w-full max-w-[350px] mb-8">
                    <div id="pix-status-indicator" class="flex items-center justify-center gap-3 bg-primary/10 px-5 py-3 rounded-2xl border border-primary/20">
                        <div class="w-2 h-2 bg-primary rounded-full animate-pulse"></div>
                        <span class="text-primary text-[10px] font-bold tracking-widest uppercase">Aguardando Pagamento...</span>
                    </div>
                    <button onclick="copyPixCode()" class="flex items-center justify-center gap-2 py-3 bg-zinc-800 rounded-2xl text-[10px] font-bold tracking-widest uppercase active:scale-95 transition-all">
                        <i data-lucide="copy" size="14"></i> Copiar Código PIX
                    </button>
                </div>
                <button onclick="resetApp()" class="text-zinc-500 text-[9px] font-bold uppercase tracking-widest p-4">Cancelar Operação</button>
            </div>
        </div>

        <!-- AJUSTES (PRODUTOS: COD | DESCRIÇÃO | VALOR) -->
        <div id="view-settings" class="hidden absolute inset-0 view-overlay flex flex-col p-8 view-transition z-50">
            <div class="flex justify-between items-center mb-8"><h2 class="text-3xl font-light tracking-tighter text-white">Configurações</h2><button onclick="toggleSettings()" class="text-white"><i data-lucide="x" size="24"></i></button></div>
            <div class="space-y-8 flex-1 overflow-y-auto pr-2 custom-scroll pb-10 text-left">
                
                <div>
                    <div class="flex items-center justify-between mb-4 border-b border-zinc-700 pb-2">
                        <p class="text-white font-bold text-sm">Inventário de Produtos</p>
                        <button onclick="addShortcutUI()" class="bg-primary/20 text-primary px-3 py-1 rounded-lg text-[10px] font-bold uppercase">Adicionar +</button>
                    </div>
                    <div class="grid grid-cols-7 gap-2 mb-2 px-1 text-[8px] uppercase tracking-widest text-zinc-500 font-black">
                        <div class="col-span-1">Cód</div>
                        <div class="col-span-4">Descrição</div>
                        <div class="col-span-1 text-right">R$</div>
                        <div class="col-span-1"></div>
                    </div>
                    <div id="shortcuts-config-list" class="space-y-4 mb-6"></div>
                </div>

                <div class="space-y-6">
                    <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest mb-2 border-b border-zinc-700 pb-1">Definições do Sistema</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-2">Tema</label><select id="input-theme" class="minimal-input" onchange="previewTheme()"><option value="dark">Escuro</option><option value="light">Claro</option></select></div>
                        <div><label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-2">Cor</label><select id="input-color" class="minimal-input" onchange="previewTheme()"><option value="#10b981">Verde</option><option value="#8b5cf6">Roxo</option><option value="#3b82f6">Azul</option><option value="#f97316">Laranja</option></select></div>
                    </div>
                    <div><label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Nome do Caixa</label><input type="text" id="input-terminal-name" class="minimal-input"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">SSID Wi-Fi</label><input type="text" id="input-wifi-ssid" class="minimal-input"></div>
                        <div><label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Senha Wi-Fi</label><input type="text" id="input-wifi-pass" class="minimal-input"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Meta Diária</label><input type="number" id="input-daily-goal" class="minimal-input"></div>
                        <div><label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Teclado</label><select id="input-kb-type" class="minimal-input"><option value="virtual">Virtual</option><option value="fisico">Físico</option></select></div>
                    </div>
                    <div><label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Chave PIX</label><input type="text" id="input-pix-key" class="minimal-input"></div>
                    <div><label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Token Mercado Pago</label><input type="password" id="input-api-key" class="minimal-input"></div>
                    <div><label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">WhatsApp</label><input type="text" id="input-whatsapp" class="minimal-input"></div>
                </div>
            </div>
            <button onclick="saveSettings()" id="btn-save" class="mt-4 py-5 w-full rounded-full bg-primary text-black font-bold uppercase text-[10px] active:scale-95 transition-all">Sincronizar e Salvar</button>
        </div>

        <!-- CAIXA -->
        <div id="view-closing" class="hidden absolute inset-0 view-overlay flex flex-col p-8 view-transition z-30">
            <div class="flex justify-between items-center mb-8"><h2 class="text-3xl font-light tracking-tighter text-white">Resumo</h2><button onclick="resetApp()" class="text-white"><i data-lucide="x" size="24"></i></button></div>
            <div class="flex-1 overflow-y-auto custom-scroll pb-6">
                <div class="mb-8 p-6 bg-zinc-800/40 rounded-3xl border border-white/5">
                    <div class="flex justify-between items-end mb-3"><p class="text-zinc-500 text-[10px] uppercase">Atingido</p><p id="closing-progress-text" class="text-xs font-bold text-primary">0%</p></div>
                    <div class="w-full h-2 bg-zinc-900 rounded-full overflow-hidden mb-4"><div id="closing-progress-bar" class="progress-bar-inner h-full bg-primary" style="width: 0%"></div></div>
                    <p id="closing-total" class="text-5xl font-black text-white">R$ 0,00</p>
                </div>
                <div class="space-y-3" id="sales-list"></div>
            </div>
            <button onclick="closeShift()" class="mt-4 py-5 w-full rounded-full bg-red-500 text-white font-bold uppercase text-[10px]">Fechar Turno</button>
        </div>

        <div id="view-success" class="hidden absolute inset-0 view-overlay flex flex-col items-center justify-center p-8 z-40 text-center"><div class="w-24 h-24 bg-primary rounded-full flex items-center justify-center mb-6 shadow-[0_0_50px_var(--primary-color)]"><i data-lucide="check" class="text-black" stroke-width="4" size="48"></i></div><h2 class="text-primary font-extrabold tracking-widest uppercase text-xl">PAGO!</h2></div>
        <div id="view-wifi" class="hidden absolute inset-0 view-overlay flex flex-col items-center justify-center p-8 z-30"><div class="qr-wrapper mb-6"><div id="wifi-qr-box"></div></div><p id="wifi-ssid-val" class="text-white font-bold text-xl"></p><button onclick="resetApp()" class="px-8 py-4 rounded-full bg-white text-black font-bold uppercase mt-8">VOLTAR</button></div>
        <div id="view-support" class="hidden absolute inset-0 view-overlay flex flex-col items-center justify-center p-8 z-30"><div class="qr-wrapper mb-6"><div id="whatsapp-qr"></div></div><button onclick="resetApp()" class="px-8 py-4 rounded-full border border-zinc-700 text-white font-bold uppercase mt-8">FECHAR</button></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyD3E7c_4jbnLJCGCapM5L8rta6AXVHvZgs", authDomain: "indisponivel-rrehfe.firebaseapp.com", databaseURL: "https://indisponivel-rrehfe.firebaseio.com", projectId: "indisponivel-rrehfe", storageBucket: "indisponivel-rrehfe.firebasestorage.app", messagingSenderId: "880210924564", appId: "1:880210924564:web:fd565cdb0e4f04cd7ac301" };
    const safeAppId = 'pdv-ultra-minimal';
    
    let db, auth, lastPixString = "";
    let currentDigits = "", salesData = [], cartTotal = 0, cartItems = [];
    let unsubscribePayment = null, pdvMode = 'COMMAND'; 

    let terminalConfig = {
        terminalName: "CAIXA", pixKey: "", mpApiKey: "", theme: "dark", color: "#10b981", voice: "on", lastClosed: 0, kbType: "virtual", wifiSSID: "", wifiPass: "", whatsapp: "", dailyGoal: 1000,
        shortcuts: {} 
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq = 440, duration = 0.05, volume = 0.1) {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.frequency.value = freq; gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const initFirebase = async () => {
        const app = initializeApp(firebaseConfig);
        db = getDatabase(app); auth = getAuth(app);
        try { await signInAnonymously(auth); } catch (err) {}
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main`), (snapshot) => {
                    const data = snapshot.val();
                    if (data) { 
                        terminalConfig = { ...terminalConfig, ...data }; 
                        if (!terminalConfig.shortcuts) terminalConfig.shortcuts = {};
                        updateUIFromConfig(); 
                        document.documentElement.style.setProperty('--primary-color', terminalConfig.color || '#10b981');
                    } 
                });
                onValue(ref(db, `artifacts/${safeAppId}/public/data/sales`), (snapshot) => {
                    salesData = []; snapshot.forEach(child => { salesData.push({ id: child.key, ...child.val() }); });
                    salesData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    renderSales();
                });
                document.getElementById('status-dot').className = "w-1.5 h-1.5 bg-primary rounded-full animate-pulse";
                document.getElementById('terminal-name-label').textContent = terminalConfig.terminalName || "ONLINE";
            }
        });
    };

    if ('getBattery' in navigator) {
        navigator.getBattery().then(battery => {
            const up = () => { document.getElementById('battery-level').textContent = Math.round(battery.level * 100) + "%"; document.getElementById('battery-status').style.opacity = battery.charging ? "1" : "0.4"; };
            up(); battery.addEventListener('levelchange', up); battery.addEventListener('chargingchange', up);
        });
    }

    function speak(text) { if (terminalConfig.voice === "off" || !window.speechSynthesis) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'pt-BR'; u.rate = 1.1; window.speechSynthesis.speak(u); }

    window.pressKey = (key) => {
        playBeep(600, 0.04, 0.05); if (navigator.vibrate) navigator.vibrate(20);
        if (key === 'back') { currentDigits = currentDigits.slice(0, -1); } 
        else if (key === 'enter') { handleAction(); return; } 
        else {
            if (pdvMode === 'COMMAND') { if (currentDigits.length < 3) currentDigits += key; } 
            else { if (key === '0' && currentDigits === "") return; if (currentDigits.length < 8) currentDigits += key; }
        }
        updateDisplay();
    };

    function updateDisplay() {
        const valBox = document.getElementById('display-value'), currencyBox = document.getElementById('display-currency'), label = document.getElementById('instruction-label'), body = document.getElementById('app-body');
        
        if (pdvMode === 'COMMAND') {
            body.classList.remove('mode-payment'); currencyBox.classList.add('hidden');
            valBox.textContent = currentDigits || "0"; valBox.className = "text-[9rem] font-bold tracking-tighter text-white transition-all";
            const c = currentDigits;
            
            if (terminalConfig.shortcuts && terminalConfig.shortcuts[c]) {
                const prod = terminalConfig.shortcuts[c];
                label.textContent = `ADD: ${prod.desc.toUpperCase()}`;
                valBox.classList.add('text-primary');
            } else if (c === '' || c === '0') {
                label.textContent = cartTotal > 0 ? "0 + ENTER PARA FINALIZAR" : "ENTER PARA VENDA MANUAL";
            }
            else if (c === '1') label.textContent = "1 - WI-FI"; else if (c === '2') label.textContent = "2 - SUPORTE";
            else if (c === '3') label.textContent = "3 - CONFIGURAÇÕES"; else if (c === '5') label.textContent = "5 - CAIXA";
            else label.textContent = "DIGITE UM CÓDIGO";
        } else {
            currencyBox.classList.remove('hidden');
            const val = currentDigits === "" ? 0 : parseInt(currentDigits);
            valBox.textContent = (val / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            valBox.className = "text-[7.5rem] font-black tracking-tighter text-primary";
            label.textContent = "VALOR MANUAL";
        }
    }

    function handleAction() {
        if (pdvMode === 'COMMAND') {
            const code = currentDigits === "" ? "0" : currentDigits; 
            currentDigits = "";
            if (terminalConfig.shortcuts && terminalConfig.shortcuts[code]) {
                const prod = terminalConfig.shortcuts[code];
                cartTotal += parseFloat(prod.value);
                cartItems.push({ desc: prod.desc, amount: parseFloat(prod.value) });
                playBeep(880, 0.1, 0.2); updateCartUI(); updateDisplay(); return;
            }
            if (code === '0') { 
                if (cartTotal > 0) { processSalePIX(cartTotal); } 
                else { pdvMode = 'PAYMENT'; playBeep(880, 0.1); speak("Venda manual."); }
            }
            else if (code === '1') showWifi(); 
            else if (code === '2') showSupport();
            else if (code === '3') toggleSettings(); 
            else if (code === '5') { document.getElementById('view-closing').classList.remove('hidden'); renderSales(); }
            else playBeep(150, 0.2); updateDisplay();
        } else {
            const val = currentDigits === "" ? 0 : parseInt(currentDigits);
            if (val <= 0) return;
            const amount = val / 100;
            cartItems.push({ desc: "Venda Manual", amount: amount });
            cartTotal += amount; processSalePIX(cartTotal);
        }
    }

    function updateCartUI() {
        const badge = document.getElementById('main-total-badge'), valEl = document.getElementById('main-cart-total-val'), list = document.getElementById('main-cart-list');
        if (cartTotal > 0) {
            badge.style.opacity = "1"; badge.style.transform = "scale(1)";
            valEl.textContent = cartTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            list.innerHTML = cartItems.slice(-4).map(item => `
                <div class="item-row flex justify-between items-center text-[10px] font-bold uppercase tracking-widest text-primary/80">
                    <span class="truncate pr-4">${item.desc}</span>
                    <span class="whitespace-nowrap">R$ ${item.amount.toFixed(2)}</span>
                </div>`).join('');
        } else { badge.style.opacity = "0"; badge.style.transform = "scale(0.9)"; list.innerHTML = ""; }
    }

    async function processSalePIX(amount) {
        document.getElementById('view-pix').classList.remove('hidden');
        document.getElementById('pix-amount-label').textContent = amount.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const txId = "TX_" + Date.now();
        const txRef = ref(db, `artifacts/${safeAppId}/public/data/transactions/${txId}`);
        set(txRef, { status: 'pendente', amount: amount });
        unsubscribePayment = onValue(txRef, (snapshot) => { if (snapshot.val()?.status === 'pago') registerSale(amount); });
        lastPixString = "00020101021126580014BR.GOV.BCB.PIX0136"+(terminalConfig.pixKey || "pix")+"52040000530398654"+amount.toFixed(2).length.toString().padStart(2,'0')+amount.toFixed(2)+"5802BR5903PDV6009SAO PAULO62070503***6304";
        document.getElementById('pix-qr-box').innerHTML = "";
        new QRCode(document.getElementById('pix-qr-box'), { text: lastPixString, width: 350, height: 350, correctLevel: QRCode.CorrectLevel.H });
        speak(`Total de ${amount.toFixed(2)} reais. Aguardando PIX.`);
    }

    window.copyPixCode = () => {
        const el = document.createElement('textarea'); el.value = lastPixString; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
        showMessage("PIX Copiado!", true);
    };

    function registerSale(amount) {
        push(ref(db, `artifacts/${safeAppId}/public/data/sales`), { amount: amount, timestamp: new Date().toISOString(), items: cartItems });
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        speak("Pagamento recebido!");
        document.querySelectorAll('.view-overlay').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-success').classList.remove('hidden');
        cartTotal = 0; cartItems = []; updateCartUI();
        setTimeout(resetApp, 3000);
    }

    window.addShortcutUI = () => {
        const id = Date.now();
        const html = `
            <div class="shortcut-item grid grid-cols-7 gap-2 items-center" id="sc-${id}">
                <input type="text" placeholder="CÓD" class="col-span-1 minimal-input text-center text-primary font-black" data-key="trigger">
                <input type="text" placeholder="DESCRIÇÃO" class="col-span-4 minimal-input text-[11px]" data-key="desc">
                <input type="number" placeholder="0.00" class="col-span-1 minimal-input text-right" data-key="value">
                <button onclick="document.getElementById('sc-${id}').remove()" class="col-span-1 text-red-500/50 flex justify-center"><i data-lucide="trash-2" size="16"></i></button>
            </div>`;
        document.getElementById('shortcuts-config-list').insertAdjacentHTML('beforeend', html); lucide.createIcons();
    };

    function renderShortcutsConfig() {
        const list = document.getElementById('shortcuts-config-list'); list.innerHTML = "";
        Object.entries(terminalConfig.shortcuts || {}).forEach(([trigger, prod]) => {
            const id = Math.random().toString(36).substr(2, 9);
            const html = `
                <div class="shortcut-item grid grid-cols-7 gap-2 items-center" id="sc-${id}">
                    <input type="text" value="${trigger}" class="col-span-1 minimal-input text-center text-primary font-black" data-key="trigger">
                    <input type="text" value="${prod.desc}" class="col-span-4 minimal-input text-[11px]" data-key="desc">
                    <input type="number" value="${prod.value}" class="col-span-1 minimal-input text-right" data-key="value">
                    <button onclick="document.getElementById('sc-${id}').remove()" class="col-span-1 text-red-500/50 flex justify-center"><i data-lucide="trash-2" size="16"></i></button>
                </div>`;
            list.insertAdjacentHTML('beforeend', html);
        });
        lucide.createIcons();
    }

    window.resetApp = () => { if(unsubscribePayment) unsubscribePayment(); document.querySelectorAll('.view-overlay').forEach(v => v.classList.add('hidden')); pdvMode = 'COMMAND'; currentDigits = ""; cartTotal = 0; cartItems = []; updateCartUI(); updateDisplay(); };

    window.toggleSettings = () => {
        const v = document.getElementById('view-settings');
        if(v.classList.contains('hidden')) {
            const getEl = (id) => document.getElementById(id);
            if(getEl('input-terminal-name')) getEl('input-terminal-name').value = terminalConfig.terminalName || "";
            if(getEl('input-daily-goal')) getEl('input-daily-goal').value = terminalConfig.dailyGoal || "";
            if(getEl('input-pix-key')) getEl('input-pix-key').value = terminalConfig.pixKey || "";
            if(getEl('input-wifi-ssid')) getEl('input-wifi-ssid').value = terminalConfig.wifiSSID || "";
            if(getEl('input-wifi-pass')) getEl('input-wifi-pass').value = terminalConfig.wifiPass || "";
            if(getEl('input-whatsapp')) getEl('input-whatsapp').value = terminalConfig.whatsapp || "";
            if(getEl('input-api-key')) getEl('input-api-key').value = terminalConfig.mpApiKey || "";
            if(getEl('input-theme')) getEl('input-theme').value = terminalConfig.theme || "dark";
            if(getEl('input-color')) getEl('input-color').value = terminalConfig.color || "#10b981";
            if(getEl('input-kb-type')) getEl('input-kb-type').value = terminalConfig.kbType || "virtual";
            renderShortcutsConfig(); v.classList.remove('hidden');
        } else v.classList.add('hidden');
    };
    
    window.saveSettings = async () => {
        const shortcuts = {};
        document.querySelectorAll('.shortcut-item').forEach(item => {
            const tEl = item.querySelector('[data-key="trigger"]');
            const dEl = item.querySelector('[data-key="desc"]');
            const vEl = item.querySelector('[data-key="value"]');
            if (tEl && vEl && tEl.value && vEl.value) {
                shortcuts[tEl.value] = { desc: dEl ? dEl.value : "Produto", value: parseFloat(vEl.value) };
            }
        });

        const getVal = (id) => {
            const el = document.getElementById(id);
            return el ? el.value : "";
        };

        const cfg = { 
            ...terminalConfig, 
            terminalName: getVal('input-terminal-name'), 
            dailyGoal: parseFloat(getVal('input-daily-goal')) || 0,
            pixKey: getVal('input-pix-key'), 
            wifiSSID: getVal('input-wifi-ssid'), 
            wifiPass: getVal('input-wifi-pass'), 
            whatsapp: getVal('input-whatsapp'), 
            shortcuts: shortcuts, 
            mpApiKey: getVal('input-api-key'),
            kbType: getVal('input-kb-type'),
            theme: getVal('input-theme'),
            color: getVal('input-color')
        };
        
        if (db && auth.currentUser) {
            await set(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main`), cfg);
            resetApp();
        }
    };

    function updateUIFromConfig() { 
        document.getElementById('terminal-name-label').textContent = terminalConfig.terminalName || "OFFLINE"; 
        const keypad = document.getElementById('virtual-keypad');
        if (keypad) keypad.style.display = (terminalConfig.kbType === 'fisico') ? 'none' : 'grid';
    }

    function showMessage(t, s) { 
        const b = document.getElementById('message-box'); 
        document.getElementById('message-text').textContent = t; 
        b.style.opacity = "1"; setTimeout(() => b.style.opacity = "0", 2500); 
    }

    function showWifi() { document.getElementById('view-wifi').classList.remove('hidden'); document.getElementById('wifi-ssid-val').textContent = terminalConfig.wifiSSID; document.getElementById('wifi-qr-box').innerHTML=""; new QRCode(document.getElementById('wifi-qr-box'), { text: `WIFI:S:${terminalConfig.wifiSSID};P:${terminalConfig.wifiPass};;`, width: 350, height: 350 }); }
    function showSupport() { document.getElementById('view-support').classList.remove('hidden'); document.getElementById('whatsapp-qr').innerHTML=""; new QRCode(document.getElementById('whatsapp-qr'), { text: `https://wa.me/${terminalConfig.whatsapp}`, width: 350, height: 350 }); }

    function renderSales() {
        const list = document.getElementById('sales-list'), pb = document.getElementById('closing-progress-bar'), pt = document.getElementById('closing-progress-text');
        if(!list) return;
        list.innerHTML = ""; let t = 0;
        salesData.forEach(s => { 
            if(new Date(s.timestamp).getTime() > terminalConfig.lastClosed) { 
                t += s.amount; 
                list.innerHTML += `
                <div class="bg-zinc-800/60 p-4 rounded-2xl flex justify-between">
                    <div>
                        <p class="text-[9px] text-zinc-500 uppercase">${new Date(s.timestamp).toLocaleTimeString()}</p>
                        <p class="text-[10px] text-white font-bold">${(s.items || []).map(i => i.desc).join(', ')}</p>
                    </div>
                    <span class="text-white font-bold">R$ ${s.amount.toFixed(2)}</span>
                </div>`; 
            } 
        });
        document.getElementById('closing-total').textContent = t.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        const perc = Math.min(100, Math.round((t / (terminalConfig.dailyGoal || 1)) * 100)); 
        if(pb) pb.style.width = perc + "%"; if(pt) pt.textContent = perc + "%";
    }

    window.closeShift = () => { set(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main/lastClosed`), Date.now()); resetApp(); };

    window.previewTheme = () => {
        const theme = document.getElementById('input-theme').value;
        const color = document.getElementById('input-color').value;
        if (theme === 'dark') document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark');
        document.documentElement.style.setProperty('--primary-color', color);
    };

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        const vMain = document.querySelectorAll('.view-overlay.hidden').length === document.querySelectorAll('.view-overlay').length;
        if (e.key === 'Escape') resetApp();
        if (e.key === 'Enter' && vMain) handleAction();
        if (e.key === 'Backspace' && vMain) pressKey('back');
        if (e.key >= '0' && e.key <= '9' && vMain) pressKey(e.key);
    });

    setInterval(() => { const d = new Date(); document.getElementById('clock').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0') + ":" + d.getSeconds().toString().padStart(2,'0'); }, 1000);
    window.addEventListener('load', () => { lucide.createIcons(); initFirebase(); });
</script>
</body>
</html>
