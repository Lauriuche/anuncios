<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#18181b" id="meta-theme-color">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiB2aWV3Qm94PSIwIDAgNTEyIDUxMiI+PHJlY3Qgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIGZpbGw9IiMwMDAiLz48Y2lyY2xlIGN4PSIyNTYiIGN5PSIyNTYiIHI9IjEyMCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjMyIi8+PC9zdmc+">
    
    <title>Terminal PDV PIX • Pro Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        primary: 'var(--primary-color)',
                        terminalBg: 'var(--bg-color)'
                    } 
                } 
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        
        :root { 
            --primary-color: #10b981; 
            --bg-color: #18181b;
            --primary-glow: rgba(16, 185, 129, 0.15);
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Inter', sans-serif; overflow: hidden; 
            user-select: none; -webkit-user-select: none; 
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: var(--bg-color);
        }

        body { color: #ffffff; }
        
        .terminal-container { 
            width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; 
            transition: all 0.5s ease;
            background-color: var(--bg-color);
        }

        .mode-payment .terminal-container { 
            box-shadow: inset 0 0 80px var(--primary-glow); 
        }
        
        @media (min-width: 768px) {
            body { display: flex; align-items: center; justify-content: center; background-color: #09090b !important; }
            .terminal-container { 
                max-width: 450px; height: 90vh; max-height: 850px; 
                border-radius: 40px; overflow: hidden; 
                border: 1px solid rgba(255,255,255,0.05); 
            }
        }

        .keypad-btn { background: transparent; border-radius: 999px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 400; cursor: pointer; }
        .keypad-btn:active { background: rgba(255, 255, 255, 0.08); transform: scale(0.9); }
        .btn-enter { background: #ffffff; color: #000000; font-weight: 700; }
        
        .qr-wrapper { 
            background: #ffffff; padding: 20px; border-radius: 28px; display: inline-block; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); transform: scale(0.9); 
            animation: qrEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        @keyframes qrEntry { to { transform: scale(1); opacity: 1; } }

        .minimal-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 8px 0; font-size: 1rem; outline: none; transition: all 0.3s; color: white; }
        .minimal-input:focus { border-bottom-color: var(--primary-color); }
        select.minimal-input option { background-color: #18181b; color: white; }

        .view-overlay { background: var(--bg-color); z-index: 20; position: absolute; inset: 0; }
        .custom-scroll::-webkit-scrollbar { width: 0px; }

        .shortcut-view-mode {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .shortcut-view-mode:hover { background: rgba(255,255,255,0.06); border-color: var(--primary-color); }
        .shortcut-edit-mode { background: rgba(255,255,255,0.05); border: 1px solid var(--primary-color); padding: 16px; border-radius: 20px; }

        .cart-list-main { max-height: 140px; overflow-y: auto; width: 100%; text-align: center; margin-bottom: 15px; }
        .item-row { animation: itemEntry 0.4s ease-out forwards; }
        @keyframes itemEntry { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        #screensaver { background-color: #000000; z-index: 1000; display: none; opacity: 0; transition: opacity 1s; }
        #screensaver.active { display: flex; opacity: 1; }
    </style>
</head>
<body class="md:p-6" id="app-body">

            <div class="space-y-8 flex-1 overflow-y-auto pr-2 custom-scroll pb-10 text-left">

        <div id="view-wifi" class="hidden absolute inset-0 view-overlay flex flex-col items-center justify-center p-8 z-30"><div class="qr-wrapper mb-6"><div id="wifi-qr-box"></div></div><p id="wifi-ssid-val" class="text-white font-bold text-xl mb-4"></p><button onclick="resetApp()" class="px-10 py-4 rounded-full bg-white text-black font-bold uppercase">VOLTAR</button></div>
        <div id="view-support" class="hidden absolute inset-0 view-overlay flex flex-col items-center justify-center p-8 z-30"><div class="qr-wrapper mb-6"><div id="whatsapp-qr"></div></div><p id="whatsapp-num-val" class="text-white font-bold text-xl mb-4"></p><button onclick="resetApp()" class="px-10 py-4 rounded-full border border-white/10 text-white font-bold uppercase">FECHAR</button></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyD3E7c_4jbnLJCGCapM5L8rta6AXVHvZgs", authDomain: "indisponivel-rrehfe.firebaseapp.com", databaseURL: "https://indisponivel-rrehfe.firebaseio.com", projectId: "indisponivel-rrehfe", storageBucket: "indisponivel-rrehfe.firebasestorage.app", messagingSenderId: "880210924564", appId: "1:880210924564:web:fd565cdb0e4f04cd7ac301" };
    const safeAppId = 'pdv-ultra-minimal';
    
    let db, auth, lastPixString = "";
    let currentDigits = "", salesData = [], cartTotal = 0, cartItems = [];
    let unsubscribePayment = null, pdvMode = 'COMMAND'; 

    let terminalConfig = {
        terminalName: "CAIXA", pixKey: "", mpApiKey: "", theme: "dark", color: "#10b981", bgColor: "#18181b", voice: "on", lastClosed: 0, kbType: "virtual", whatsapp: "", wifiSSID: "", wifiPass: "", dailyGoal: 1000, shortcuts: {} 
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq = 440, duration = 0.05, volume = 0.1) {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.frequency.value = freq; gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const initFirebase = async () => {
        const app = initializeApp(firebaseConfig);
        db = getDatabase(app); auth = getAuth(app);
        try { await signInAnonymously(auth); } catch (err) {}
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main`), (snapshot) => {
                    const data = snapshot.val();
                    if (data) { 
                        terminalConfig = { ...terminalConfig, ...data }; 
                        if (!terminalConfig.shortcuts) terminalConfig.shortcuts = {};
                        applyThemeSettings(); updateUIFromConfig(); 
                    } 
                });
                onValue(ref(db, `artifacts/${safeAppId}/public/data/sales`), (snapshot) => {
                    salesData = []; snapshot.forEach(child => { salesData.push({ id: child.key, ...child.val() }); });
                    salesData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    renderSales();
                });
                document.getElementById('status-dot').className = "w-1.5 h-1.5 bg-primary rounded-full animate-pulse";
            }
        });
    };

    window.previewTheme = () => {
        const color = document.getElementById('input-color')?.value || '#10b981';
        const bg = document.getElementById('input-bg')?.value || '#18181b';
        document.documentElement.style.setProperty('--primary-color', color);
        document.documentElement.style.setProperty('--bg-color', bg);
        const r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
        document.documentElement.style.setProperty('--primary-glow', `rgba(${r}, ${g}, ${b}, 0.15)`);
        document.getElementById('meta-theme-color').content = bg;
    };

    function applyThemeSettings() {
        const color = terminalConfig.color || '#10b981';
        const bg = terminalConfig.bgColor || '#18181b';
        document.documentElement.style.setProperty('--primary-color', color);
        document.documentElement.style.setProperty('--bg-color', bg);
        const r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
        document.documentElement.style.setProperty('--primary-glow', `rgba(${r}, ${g}, ${b}, 0.15)`);
        document.getElementById('meta-theme-color').content = bg;
    }

    if ('getBattery' in navigator) {
        navigator.getBattery().then(battery => {
            const up = () => { document.getElementById('battery-level').textContent = Math.round(battery.level * 100) + "%"; document.getElementById('battery-status').style.opacity = battery.charging ? "1" : "0.4"; };
            up(); battery.addEventListener('levelchange', up); battery.addEventListener('chargingchange', up);
        });
    }

    function speak(text) { if (terminalConfig.voice === "off" || !window.speechSynthesis) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'pt-BR'; u.rate = 1.1; window.speechSynthesis.speak(u); }

    window.pressKey = (key) => {
        playBeep(600, 0.04, 0.05); if (navigator.vibrate) navigator.vibrate(20);
        
        if (key === 'back') { 
            // CANCELAMENTO INTELIGENTE
            if (currentDigits === "") {
                if (pdvMode === 'PAYMENT') {
                    // Se entrou no modo manual sem querer, volta pro código
                    resetApp();
                    showMessage("Manual Cancelado");
                    return;
                }
                if (pdvMode === 'COMMAND' && cartTotal > 0) {
                    // Se tem itens no carrinho e apagou, limpa tudo (desistir da venda)
                    resetApp();
                    showMessage("Venda Cancelada");
                    return;
                }
            }
            currentDigits = currentDigits.slice(0, -1); 
        } 
        else if (key === 'enter') { handleAction(); return; } 
        else {
            if (pdvMode === 'COMMAND') { if (currentDigits.length < 3) currentDigits += key; } 
            else { 
                if (key === '0' && currentDigits === "") { resetApp(); return; }
                if (currentDigits.length < 8) currentDigits += key; 
            }
        }
        updateDisplay();
    };

    function updateDisplay() {
        const valBox = document.getElementById('display-value'), currencyBox = document.getElementById('display-currency'), label = document.getElementById('instruction-label'), hint = document.getElementById('back-hint');
        
        if (pdvMode === 'COMMAND') {
            document.getElementById('app-body').classList.remove('mode-payment'); currencyBox.classList.add('hidden');
            valBox.textContent = currentDigits || "0"; valBox.className = "text-[9rem] font-bold tracking-tighter text-white transition-all";
            const c = currentDigits;
            
            if (terminalConfig.shortcuts && terminalConfig.shortcuts[c]) {
                const s = terminalConfig.shortcuts[c];
                label.textContent = (s.type === 'venda') ? `ADD: ${s.desc.toUpperCase()}` : `RUN: ${s.desc.toUpperCase()}`;
                valBox.classList.add('text-primary');
            } else if (c === '' || c === '0') {
                label.textContent = cartTotal > 0 ? "0 + ENTER PARA FINALIZAR" : "ENTER PARA VENDA MANUAL";
            } else label.textContent = "DIGITE UM CÓDIGO";

            // Mostrar hint de cancelar se houver carrinho
            if (cartTotal > 0 && currentDigits === "") {
                hint.textContent = "Apagar p/ Cancelar Venda";
                hint.style.opacity = "1";
            } else { hint.style.opacity = "0"; }

        } else {
            document.getElementById('app-body').classList.add('mode-payment'); currencyBox.classList.remove('hidden');
            const val = currentDigits === "" ? 0 : parseInt(currentDigits);
            valBox.textContent = (val / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            valBox.className = "text-[7.5rem] font-black tracking-tighter text-primary";
            label.textContent = "VALOR MANUAL";
            
            if (currentDigits === "") {
                hint.textContent = "Apagar p/ Voltar";
                hint.style.opacity = "1";
            } else { hint.style.opacity = "0"; }
        }
    }

    function handleAction() {
        if (pdvMode === 'COMMAND') {
            const code = currentDigits === "" ? "0" : currentDigits; currentDigits = "";
            if (terminalConfig.shortcuts && terminalConfig.shortcuts[code]) {
                const s = terminalConfig.shortcuts[code];
                if (s.type === 'venda') {
                    cartTotal += parseFloat(s.value); cartItems.push({ desc: s.desc, amount: parseFloat(s.value) });
                    playBeep(880, 0.1, 0.2); updateCartUI(); updateDisplay(); return;
                } else {
                    if (s.funcType === 'wifi') showWifi(s.ssid, s.pass);
                    else if (s.funcType === 'contato') showSupport(s.whatsapp);
                    else if (s.funcType === 'config') toggleSettings();
                    else if (s.funcType === 'caixa') { document.getElementById('view-closing').classList.remove('hidden'); renderSales(); }
                    return;
                }
            }
            if (code === '0') { 
                if (cartTotal > 0) { processSalePIX(cartTotal); } 
                else { pdvMode = 'PAYMENT'; playBeep(880, 0.1); } 
            } else playBeep(150, 0.2); updateDisplay();
        } else {
            const val = currentDigits === "" ? 0 : parseInt(currentDigits);
            if (val <= 0) return;
            const amount = val / 100; cartItems.push({ desc: "Venda Manual", amount: amount });
            cartTotal += amount; processSalePIX(cartTotal);
        }
    }

    function updateCartUI() {
        const badge = document.getElementById('main-total-badge'), valEl = document.getElementById('main-cart-total-val'), list = document.getElementById('main-cart-list');
        if (cartTotal > 0) {
            badge.style.opacity = "1"; badge.style.transform = "scale(1)"; valEl.textContent = cartTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            list.innerHTML = cartItems.slice(-4).map(item => `<div class="item-row flex justify-between items-center text-[10px] font-bold uppercase tracking-widest text-primary/80"><span class="truncate pr-4">${item.desc}</span><span>R$ ${item.amount.toFixed(2)}</span></div>`).join('');
        } else { badge.style.opacity = "0"; badge.style.transform = "scale(0.9)"; list.innerHTML = ""; }
    }

    async function processSalePIX(amount) {
        document.getElementById('view-pix').classList.remove('hidden');
        document.getElementById('pix-amount-label').textContent = amount.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const txId = "TX_" + Date.now();
        const txRef = ref(db, `artifacts/${safeAppId}/public/data/transactions/${txId}`);
        set(txRef, { status: 'pendente', amount: amount });
        unsubscribePayment = onValue(txRef, (snapshot) => { if (snapshot.val()?.status === 'pago') registerSale(amount); });
        lastPixString = "00020101021126580014BR.GOV.BCB.PIX0136"+(terminalConfig.pixKey || "pix")+"52040000530398654"+amount.toFixed(2).length.toString().padStart(2,'0')+amount.toFixed(2)+"5802BR5903PDV6009SAO PAULO62070503***6304";
        document.getElementById('pix-qr-box').innerHTML = "";
        new QRCode(document.getElementById('pix-qr-box'), { text: lastPixString, width: 350, height: 350, correctLevel: QRCode.CorrectLevel.H });
    }

    window.copyPixCode = () => {
        const el = document.createElement('textarea'); el.value = lastPixString; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
        showMessage("PIX Copiado!");
    };

    function registerSale(amount) {
        push(ref(db, `artifacts/${safeAppId}/public/data/sales`), { amount: amount, timestamp: new Date().toISOString(), items: cartItems });
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        document.querySelectorAll('.view-overlay').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-success').classList.remove('hidden');
        cartTotal = 0; cartItems = []; updateCartUI(); setTimeout(resetApp, 3000);
    }

    // --- LOGICA DE INVENTÁRIO (MODO LISTA + EDIÇÃO) ---
    window.addShortcutUI = () => { renderShortcutRow(Date.now(), null, true); };

    function renderShortcutRow(id, s, isEdit) {
        const container = document.getElementById('shortcuts-config-list');
        let html = '';
        if (isEdit) {
            html = `
            <div class="shortcut-item shortcut-edit-mode" id="sc-${id}" data-editing="true">
                <div class="grid grid-cols-7 gap-2 items-center mb-3">
                    <input type="text" placeholder="CÓD" class="col-span-1 minimal-input text-center text-primary font-black" data-key="trigger" value="${s ? s.trigger : ''}">
                    <select class="col-span-2 minimal-input text-[10px] font-bold" data-key="type" onchange="updateShortcutFields('${id}')">
                        <option value="venda" ${s?.type === 'venda' ? 'selected' : ''}>Venda</option>
                        <option value="funcao" ${s?.type === 'funcao' ? 'selected' : ''}>Função</option>
                    </select>
                    <input type="text" placeholder="DESCRIÇÃO" class="col-span-3 minimal-input text-[11px]" data-key="desc" value="${s ? s.desc : ''}">
                    <button onclick="document.getElementById('sc-${id}').remove()" class="col-span-1 text-red-500/50 flex justify-center"><i data-lucide="trash-2" size="16"></i></button>
                </div>
                <div id="fields-${id}" class="grid grid-cols-1 gap-2 bg-white/5 p-3 rounded-xl"></div>
            </div>`;
            const tempDiv = document.createElement('div'); tempDiv.innerHTML = html;
            const existingItem = document.getElementById(`sc-${id}`);
            if (existingItem) container.replaceChild(tempDiv.firstElementChild, existingItem); else container.insertAdjacentElement('beforeend', tempDiv.firstElementChild);
            updateShortcutFields(id, s);
        } else {
            const typeLabel = s.type === 'venda' ? `R$ ${parseFloat(s.value).toFixed(2)}` : (s.funcType || 'Função').toUpperCase();
            html = `
            <div class="shortcut-item shortcut-view-mode" id="sc-${id}" onclick="switchShortcutToEdit('${id}', ${JSON.stringify(s).replace(/"/g, '&quot;')})">
                <div class="flex items-center gap-4">
                    <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center text-primary font-black text-xs border border-primary/20">${s.trigger}</div>
                    <div class="flex flex-col">
                        <span class="text-[11px] font-bold text-white uppercase tracking-tight">${s.desc}</span>
                        <span class="text-[8px] text-zinc-500 uppercase tracking-widest">${s.type === 'venda' ? 'Venda Pré-definida' : 'Função Interna'}</span>
                    </div>
                </div>
                <div class="text-[10px] font-black text-primary/80 bg-primary/5 px-3 py-1 rounded-md border border-primary/10">${typeLabel}</div>
                <input type="hidden" data-key="trigger" value="${s.trigger}"><input type="hidden" data-key="type" value="${s.type}"><input type="hidden" data-key="desc" value="${s.desc}">
                <div class="hidden" id="fields-${id}"></div>
            </div>`;
            const tempDiv = document.createElement('div'); tempDiv.innerHTML = html;
            const existingItem = document.getElementById(`sc-${id}`);
            if (existingItem) container.replaceChild(tempDiv.firstElementChild, existingItem); else container.insertAdjacentElement('beforeend', tempDiv.firstElementChild);
            const hiddenFields = document.getElementById(`fields-${id}`);
            if (s.type === 'venda') { hiddenFields.innerHTML = `<input type="hidden" data-key="value" value="${s.value}">`; }
            else { hiddenFields.innerHTML = `<input type="hidden" data-key="funcType" value="${s.funcType}"><input type="hidden" data-key="ssid" value="${s.ssid || ''}"><input type="hidden" data-key="pass" value="${s.pass || ''}"><input type="hidden" data-key="whatsapp" value="${s.whatsapp || ''}">`; }
        }
        lucide.createIcons();
    }

    window.switchShortcutToEdit = (id, data) => { renderShortcutRow(id, { ...data, trigger: data.trigger }, true); };

    window.updateShortcutFields = (id, existing = null) => {
        const container = document.getElementById(`fields-${id}`);
        const type = document.querySelector(`#sc-${id} [data-key="type"]`).value;
        if (!container) return; container.innerHTML = "";
        if (type === 'venda') { container.innerHTML = `<input type="number" placeholder="VALOR R$" class="minimal-input" data-key="value" value="${existing?.value || ''}">`; }
        else {
            container.innerHTML = `
                <select class="minimal-input text-[10px] mb-2" data-key="funcType" onchange="updateFunctionSubFields('${id}')">
                    <option value="">Escolha a Função...</option>
                    <option value="wifi" ${existing?.funcType === 'wifi' ? 'selected' : ''}>Wi-Fi (QR Code)</option>
                    <option value="contato" ${existing?.funcType === 'contato' ? 'selected' : ''}>Contacto (WhatsApp)</option>
                    <option value="config" ${existing?.funcType === 'config' ? 'selected' : ''}>Abrir Configurações</option>
                    <option value="caixa" ${existing?.funcType === 'caixa' ? 'selected' : ''}>Abrir Caixa/Vendas</option>
                </select><div id="subfields-${id}" class="space-y-2"></div>`;
            updateFunctionSubFields(id, existing);
        }
    };

    window.updateFunctionSubFields = (id, existing = null) => {
        const sub = document.getElementById(`subfields-${id}`); if (!sub) return;
        const func = document.querySelector(`#sc-${id} [data-key="funcType"]`).value;
        sub.innerHTML = "";
        if (func === 'wifi') { sub.innerHTML = `<input type="text" placeholder="SSID" class="minimal-input text-[10px]" data-key="ssid" value="${existing?.ssid || ''}"><input type="text" placeholder="SENHA" class="minimal-input text-[10px]" data-key="pass" value="${existing?.pass || ''}">`; }
        else if (func === 'contato') { sub.innerHTML = `<input type="text" placeholder="WHATSAPP" class="minimal-input text-[10px]" data-key="whatsapp" value="${existing?.whatsapp || ''}">`; }
    };

    function renderShortcutsConfig() {
        const list = document.getElementById('shortcuts-config-list'); list.innerHTML = "";
        Object.entries(terminalConfig.shortcuts || {}).forEach(([trigger, s]) => {
            const id = Math.random().toString(36).substr(2, 9);
            renderShortcutRow(id, { ...s, trigger }, false);
        });
        lucide.createIcons();
    }

    window.resetApp = () => { 
        if(unsubscribePayment) unsubscribePayment(); 
        document.querySelectorAll('.view-overlay').forEach(v => v.classList.add('hidden')); 
        pdvMode = 'COMMAND'; currentDigits = ""; cartTotal = 0; cartItems = []; 
        updateCartUI(); updateDisplay(); 
    };

    window.toggleSettings = () => {
        const v = document.getElementById('view-settings');
        if(v.classList.contains('hidden')) {
            const setVal = (id, val) => { const el = document.getElementById(id); if(el) el.value = val || ""; };
            setVal('input-terminal-name', terminalConfig.terminalName); setVal('input-daily-goal', terminalConfig.dailyGoal);
            setVal('input-pix-key', terminalConfig.pixKey); setVal('input-api-key', terminalConfig.mpApiKey);
            setVal('input-whatsapp', terminalConfig.whatsapp); setVal('input-wifi-ssid', terminalConfig.wifiSSID); setVal('input-wifi-pass', terminalConfig.wifiPass);
            const setSelect = (id, val) => { const el = document.getElementById(id); if(el) el.value = val; };
            setSelect('input-bg', terminalConfig.bgColor); setSelect('input-color', terminalConfig.color); setSelect('input-kb-type', terminalConfig.kbType);
            renderShortcutsConfig(); v.classList.remove('hidden');
        } else v.classList.add('hidden');
    };
    
    window.saveSettings = async () => {
        const shortcuts = {};
        document.querySelectorAll('.shortcut-item').forEach(item => {
            const t = item.querySelector('[data-key="trigger"]')?.value;
            const type = item.querySelector('[data-key="type"]')?.value;
            const desc = item.querySelector('[data-key="desc"]')?.value;
            if (t) {
                const s = { type, desc };
                if (type === 'venda') { s.value = parseFloat(item.querySelector('[data-key="value"]')?.value || 0); }
                else {
                    s.funcType = item.querySelector('[data-key="funcType"]')?.value;
                    if (s.funcType === 'wifi') { s.ssid = item.querySelector('[data-key="ssid"]')?.value; s.pass = item.querySelector('[data-key="pass"]')?.value; }
                    else if (s.funcType === 'contato') { s.whatsapp = item.querySelector('[data-key="whatsapp"]')?.value; }
                }
                shortcuts[t] = s;
            }
        });
        const getVal = (id) => document.getElementById(id)?.value || "";
        const cfg = { ...terminalConfig, terminalName: getVal('input-terminal-name'), dailyGoal: parseFloat(getVal('input-daily-goal')) || 0, pixKey: getVal('input-pix-key'), mpApiKey: getVal('input-api-key'), whatsapp: getVal('input-whatsapp'), wifiSSID: getVal('input-wifi-ssid'), wifiPass: getVal('input-wifi-pass'), color: getVal('input-color'), bgColor: getVal('input-bg'), kbType: getVal('input-kb-type'), shortcuts: shortcuts };
        if (db && auth.currentUser) { await set(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main`), cfg); resetApp(); }
    };

    function updateUIFromConfig() { document.getElementById('terminal-name-label').textContent = terminalConfig.terminalName || "OFFLINE"; const keypad = document.getElementById('virtual-keypad'); if (keypad) keypad.style.display = (terminalConfig.kbType === 'fisico') ? 'none' : 'grid'; }
    function showMessage(t) { const b = document.getElementById('message-box'); document.getElementById('message-text').textContent = t; b.style.opacity = "1"; setTimeout(() => b.style.opacity = "0", 2500); }
    
    function showWifi(ssid, pass) { document.getElementById('view-wifi').classList.remove('hidden'); document.getElementById('wifi-ssid-val').textContent = ssid || "Rede"; document.getElementById('wifi-qr-box').innerHTML=""; new QRCode(document.getElementById('wifi-qr-box'), { text: `WIFI:S:${ssid};P:${pass};;`, width: 350, height: 350 }); }
    function showSupport(num) { document.getElementById('view-support').classList.remove('hidden'); document.getElementById('whatsapp-num-val').textContent = num || ""; document.getElementById('whatsapp-qr').innerHTML=""; new QRCode(document.getElementById('whatsapp-qr'), { text: `https://wa.me/${num}`, width: 350, height: 350 }); }

    function renderSales() {
        const list = document.getElementById('sales-list'), pb = document.getElementById('closing-progress-bar'), pt = document.getElementById('closing-progress-text');
        if(!list) return; list.innerHTML = ""; let t = 0;
        salesData.forEach(s => { if(new Date(s.timestamp).getTime() > terminalConfig.lastClosed) { t += s.amount; list.innerHTML += `<div class="bg-white/5 p-4 rounded-2xl flex justify-between"><div class="max-w-[70%]"><p class="text-[8px] text-zinc-500 uppercase">${new Date(s.timestamp).toLocaleTimeString()}</p><p class="text-[10px] text-white font-medium truncate">${(s.items || []).map(i => i.desc).join(', ')}</p></div><span class="text-white font-bold">R$ ${s.amount.toFixed(2)}</span></div>`; } });
        document.getElementById('closing-total').textContent = t.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        const perc = Math.min(100, Math.round((t / (terminalConfig.dailyGoal || 1)) * 100)); if(pb) pb.style.width = perc + "%"; if(pt) pt.textContent = perc + "%";
    }

    window.closeShift = () => { set(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main/lastClosed`), Date.now()); resetApp(); };

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        const vMain = document.querySelectorAll('.view-overlay.hidden').length === document.querySelectorAll('.view-overlay').length;
        if (e.key === 'Escape') resetApp();
        if (e.key === 'Enter' && vMain) handleAction();
        if (e.key === 'Backspace' && vMain) pressKey('back');
        if (e.key >= '0' && e.key <= '9' && vMain) pressKey(e.key);
    });

    setInterval(() => { const d = new Date(); document.getElementById('clock').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0') + ":" + d.getSeconds().toString().padStart(2,'0'); }, 1000);
    window.addEventListener('load', () => { lucide.createIcons(); initFirebase(); });
</script>
</body>
</html>
