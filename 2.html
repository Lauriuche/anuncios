<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiB2aWV3Qm94PSIwIDAgNTEyIDUxMiI+PHJlY3Qgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIGZpbGw9IiMwMDAiLz48Y2lyY2xlIGN4PSIyNTYiIGN5PSIyNTYiIHI9IjEyMCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjMyIi8+PC9zdmc+">
    
    <title>Terminal PDV PIX • 1:1 Dual Frame</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        primary: 'var(--primary-color)',
                        terminalBg: 'var(--bg-color)'
                    } 
                } 
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        
        :root { 
            --primary-color: #10b981; 
            --bg-color: #18181b;
            --primary-glow: rgba(16, 185, 129, 0.15);
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Inter', sans-serif; overflow: hidden; 
            user-select: none; -webkit-user-select: none; 
            background-color: #000000;
            display: flex; align-items: center; justify-content: center;
        }

        /* Container Principal */
        .app-wrapper {
            display: flex;
            flex-direction: column; 
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            padding: 12px;
            gap: 12px;
            box-sizing: border-box;
            justify-content: center;
            align-items: center;
        }

        @media (orientation: landscape) {
            .app-wrapper { flex-direction: row; padding: 16px; gap: 16px; }
        }

        /* Definição de Quadrado Perfeito 1:1 */
        .square-frame {
            aspect-ratio: 1 / 1;
            width: 100%;
            max-height: calc(50% - 12px); /* Vertical */
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        @media (orientation: landscape) {
            .square-frame {
                max-width: calc(50% - 16px);
                max-height: 100%;
            }
        }

        .frame-pdv { background-color: var(--bg-color); transition: all 0.5s ease; }
        .frame-external { background-color: #2c4e64; }

        .mode-payment .frame-pdv { box-shadow: inset 0 0 60px var(--primary-glow); }

        /* Ajustes de Elementos Internos para o 1:1 */
        .keypad-btn { 
            background: transparent; border-radius: 999px; transition: all 0.2s; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.4rem; font-weight: 400; cursor: pointer; height: 100%;
        }
        .keypad-btn:active { background: rgba(255, 255, 255, 0.08); transform: scale(0.9); }
        .btn-enter { background: #ffffff; color: #000000; font-weight: 700; }
        
        .qr-wrapper { 
            background: #ffffff; padding: 12px; border-radius: 16px; display: inline-block; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.4); transform: scale(0.8); 
            animation: qrEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        @keyframes qrEntry { to { transform: scale(0.9); opacity: 1; } }

        .minimal-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 4px 0; font-size: 0.8rem; outline: none; transition: all 0.3s; color: white; }
        .minimal-input:focus { border-bottom-color: var(--primary-color); }

        .view-overlay { background: var(--bg-color); z-index: 20; position: absolute; inset: 0; overflow-y: auto; }
        .custom-scroll::-webkit-scrollbar { width: 0px; }

        .cart-list-main { max-height: 80px; overflow-y: auto; width: 100%; text-align: center; margin-bottom: 4px; }
        
        #screensaver { background-color: #000000; z-index: 1000; display: none; opacity: 0; transition: opacity 1s; border-radius: 28px; }
        #screensaver.active { display: flex; opacity: 1; }
    </style>
</head>
<body id="app-body">

<div class="app-wrapper">
    
    <!-- FRAME 1: PDV -->
    <div class="square-frame frame-pdv">
        
        <!-- Toast Feedback -->
        <div id="message-box" class="absolute top-4 left-1/2 -translate-x-1/2 bg-zinc-800 border border-zinc-700 text-white px-4 py-1.5 rounded-full text-[8px] font-bold flex items-center gap-2 shadow-2xl transition-all opacity-0 pointer-events-none z-[100]">
            <div id="msg-dot" class="w-1 h-1 bg-primary rounded-full"></div>
            <span id="message-text">OK</span>
        </div>

        <!-- Barra de Status Compacta -->
        <div class="px-5 pt-5 flex justify-between items-center z-10 relative">
            <div class="flex items-center gap-1.5">
                <div id="status-dot" class="w-1 h-1 bg-zinc-500 rounded-full animate-pulse"></div>
                <span id="terminal-name-label" class="text-[7px] font-bold tracking-widest uppercase opacity-40">OFFLINE</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="flex items-center gap-1 opacity-30">
                    <span id="battery-level" class="text-[7px] font-bold">--%</span>
                    <i data-lucide="battery" size="10"></i>
                </div>
                <button onclick="toggleSettings()" class="text-[7px] font-bold text-zinc-500 tracking-tighter opacity-40">
                    <span id="clock">00:00:00</span>
                </button>
            </div>
        </div>

        <div class="flex-1 relative flex flex-col min-h-0 overflow-hidden">
            <div id="view-main" class="flex-1 flex flex-col p-4">
                
                <div class="flex-1 flex flex-col items-center justify-center relative">
                    <div class="cart-list-main custom-scroll px-4 space-y-1" id="main-cart-list"></div>

                    <div id="main-total-badge" class="mb-1 opacity-0 transition-all scale-75">
                        <div class="bg-primary/20 text-primary px-3 py-1 rounded-full text-[9px] font-black tracking-widest uppercase">
                            TOTAL: R$ <span id="main-cart-total-val">0,00</span>
                        </div>
                    </div>

                    <span id="instruction-label" class="text-[8px] text-zinc-500 tracking-[0.2em] uppercase mb-1 opacity-40 text-center">AGUARDANDO CÓDIGO</span>
                    
                    <div class="flex items-baseline justify-center w-full">
                        <span id="display-currency" class="hidden text-sm font-light text-zinc-500 mr-1">R$</span>
                        <span id="display-value" class="text-[4.5rem] font-bold tracking-tighter leading-none transition-all">0</span>
                    </div>
                    
                    <div id="back-hint" class="mt-1 text-[7px] font-bold tracking-widest uppercase opacity-0 transition-all text-zinc-500">
                        Apagar p/ Voltar
                    </div>
                </div>

                <!-- Teclado Grade 3x4 -->
                <div id="virtual-keypad" class="grid grid-cols-3 gap-2 pb-2 h-2/5 min-h-[140px]">
                    <button onclick="pressKey('1')" class="keypad-btn">1</button>
                    <button onclick="pressKey('2')" class="keypad-btn">2</button>
                    <button onclick="pressKey('3')" class="keypad-btn">3</button>
                    <button onclick="pressKey('4')" class="keypad-btn">4</button>
                    <button onclick="pressKey('5')" class="keypad-btn">5</button>
                    <button onclick="pressKey('6')" class="keypad-btn">6</button>
                    <button onclick="pressKey('7')" class="keypad-btn">7</button>
                    <button onclick="pressKey('8')" class="keypad-btn">8</button>
                    <button onclick="pressKey('9')" class="keypad-btn">9</button>
                    <button onclick="pressKey('back')" class="keypad-btn text-zinc-500"><i data-lucide="delete" size="18"></i></button>
                    <button onclick="pressKey('0')" class="keypad-btn">0</button>
                    <button onclick="pressKey('enter')" class="keypad-btn btn-enter rounded-xl"><i data-lucide="arrow-right" size="18"></i></button>
                </div>
            </div>

            <!-- Overlays Internos -->
            <div id="view-pix" class="hidden absolute inset-0 view-overlay z-30 flex flex-col items-center justify-center p-4">
                <div class="qr-wrapper mb-2"><div id="pix-qr-box"></div></div>
                <span class="text-lg font-bold text-white tracking-tighter mb-2" id="pix-amount-label">R$ 0,00</span>
                <button onclick="copyPixCode()" class="py-2 px-6 bg-white/5 border border-white/10 rounded-lg text-[7px] font-bold uppercase active:scale-95 mb-4">COPIAR PIX</button>
                <button onclick="resetApp()" class="text-zinc-500 text-[7px] uppercase underline">Cancelar</button>
            </div>

            <div id="view-settings" class="hidden absolute inset-0 view-overlay flex flex-col p-5 z-50">
                <div class="flex justify-between items-center mb-4"><h2 class="text-lg font-light text-white">Ajustes</h2><button onclick="toggleSettings()" class="text-white"><i data-lucide="x" size="18"></i></button></div>
                <div class="space-y-5 flex-1 overflow-y-auto custom-scroll pb-4 text-left">
                    <div id="shortcuts-container">
                        <div class="flex items-center justify-between mb-2 border-b border-zinc-700 pb-1">
                            <p class="text-white font-bold text-[9px] uppercase">Inventário</p>
                            <button onclick="addShortcutUI()" class="text-primary text-[8px] font-bold uppercase">+ Novo</button>
                        </div>
                        <div id="shortcuts-config-list" class="space-y-2"></div>
                    </div>
                    <div class="space-y-3">
                        <p class="text-zinc-500 text-[7px] uppercase font-bold tracking-widest border-b border-zinc-700 pb-1">Sistema</p>
                        <input type="text" id="input-terminal-name" class="minimal-input" placeholder="Nome Caixa">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="input-daily-goal" class="minimal-input" placeholder="Meta R$">
                            <select id="input-kb-type" class="minimal-input"><option value="virtual">Virtual</option><option value="fisico">Físico</option></select>
                        </div>
                        <input type="text" id="input-pix-key" class="minimal-input" placeholder="Chave PIX">
                        <input type="password" id="input-api-key" class="minimal-input" placeholder="Token Mercado Pago">
                        <input type="text" id="input-wifi-ssid" class="minimal-input" placeholder="SSID Wi-Fi">
                        <input type="text" id="input-wifi-pass" class="minimal-input" placeholder="Senha Wi-Fi">
                        <input type="text" id="input-whatsapp" class="minimal-input" placeholder="WhatsApp Suporte">
                        <div class="grid grid-cols-2 gap-2 pt-2">
                            <select id="input-bg" class="minimal-input" onchange="previewTheme()"><option value="#18181b">Carbono</option><option value="#0f172a">Oceano</option><option value="#000000">OLED</option></select>
                            <select id="input-color" class="minimal-input" onchange="previewTheme()"><option value="#10b981">Esmeralda</option><option value="#8b5cf6">Violeta</option><option value="#3b82f6">Azul</option></select>
                        </div>
                    </div>
                </div>
                <button onclick="saveSettings()" id="btn-save" class="py-3 w-full rounded-xl bg-primary text-black font-bold uppercase text-[8px]">Salvar Tudo</button>
            </div>

            <div id="view-closing" class="hidden absolute inset-0 view-overlay p-5 z-30 flex flex-col">
                <div class="flex justify-between items-center mb-4"><h2 class="text-base font-light text-white">Resumo</h2><button onclick="resetApp()"><i data-lucide="x" size="16"></i></button></div>
                <div class="flex-1 overflow-y-auto"><p id="closing-total" class="text-2xl font-black text-white mb-3">R$ 0,00</p><div class="space-y-1.5 text-[8px]" id="sales-list"></div></div>
                <button onclick="closeShift()" class="mt-2 py-3 w-full rounded-xl bg-red-500 text-white font-bold uppercase text-[8px]">Zerar Turno</button>
            </div>
            
            <div id="view-success" class="hidden absolute inset-0 view-overlay items-center justify-center p-4 z-40 text-center flex-col"><div class="w-14 h-14 bg-primary rounded-full flex items-center justify-center mb-2"><i data-lucide="check" class="text-black" size="24"></i></div><h2 class="text-primary font-black text-sm">PAGO!</h2></div>
            <div id="view-wifi" class="hidden absolute inset-0 view-overlay items-center justify-center p-4 z-30 flex-col"><div class="qr-wrapper mb-2"><div id="wifi-qr-box"></div></div><p id="wifi-ssid-val" class="text-white font-bold text-xs mb-4"></p><button onclick="resetApp()" class="px-6 py-2 rounded-lg bg-white text-black font-bold text-[8px]">VOLTAR</button></div>
            <div id="view-support" class="hidden absolute inset-0 view-overlay items-center justify-center p-4 z-30 flex-col"><div class="qr-wrapper mb-2"><div id="whatsapp-qr"></div></div><p id="whatsapp-num-val" class="text-white font-bold text-xs mb-4"></p><button onclick="resetApp()" class="px-6 py-2 rounded-lg border border-white/10 text-white font-bold text-[8px]">FECHAR</button></div>
        </div>
    </div>

    <!-- FRAME 2: QUADRO EXTERNO (AZUL) -->
    <div class="square-frame frame-external flex flex-col items-center justify-center p-8">
        <div class="text-white/20 text-center scale-75">
            <i data-lucide="layout-grid" size="32" class="mx-auto mb-2 opacity-10"></i>
            <p class="text-[7px] font-bold uppercase tracking-[0.4em]">Módulo Secundário</p>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyD3E7c_4jbnLJCGCapM5L8rta6AXVHvZgs", authDomain: "indisponivel-rrehfe.firebaseapp.com", databaseURL: "https://indisponivel-rrehfe.firebaseio.com", projectId: "indisponivel-rrehfe", storageBucket: "indisponivel-rrehfe.firebasestorage.app", messagingSenderId: "880210924564", appId: "1:880210924564:web:fd565cdb0e4f04cd7ac301" };
    const safeAppId = 'pdv-ultra-minimal';
    
    let db, auth, lastPixString = "";
    let currentDigits = "", salesData = [], cartTotal = 0, cartItems = [];
    let unsubscribePayment = null, pdvMode = 'COMMAND'; 

    let terminalConfig = {
        terminalName: "CAIXA", pixKey: "", mpApiKey: "", theme: "dark", color: "#10b981", bgColor: "#18181b", voice: "on", lastClosed: 0, kbType: "virtual", whatsapp: "", wifiSSID: "", wifiPass: "", dailyGoal: 1000, shortcuts: {} 
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(f = 440, d = 0.05, v = 0.1) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.value = f; g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
    }

    const initFirebase = async () => {
        const app = initializeApp(firebaseConfig);
        db = getDatabase(app); auth = getAuth(app);
        try { await signInAnonymously(auth); } catch (e) {}
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main`), (snap) => {
                    const data = snap.val();
                    if (data) { 
                        terminalConfig = { ...terminalConfig, ...data }; 
                        if (!terminalConfig.shortcuts) terminalConfig.shortcuts = {};
                        applyThemeSettings(); updateUIFromConfig(); 
                    } 
                });
                onValue(ref(db, `artifacts/${safeAppId}/public/data/sales`), (snap) => {
                    salesData = []; snap.forEach(child => { salesData.push({ id: child.key, ...child.val() }); });
                    salesData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    renderSales();
                });
                document.getElementById('status-dot').className = "w-1 h-1 bg-primary rounded-full animate-pulse";
            }
        });
    };

    window.previewTheme = () => {
        const color = document.getElementById('input-color')?.value || '#10b981';
        const bg = document.getElementById('input-bg')?.value || '#18181b';
        document.documentElement.style.setProperty('--primary-color', color);
        document.documentElement.style.setProperty('--bg-color', bg);
    };

    function applyThemeSettings() {
        const c = terminalConfig.color || '#10b981', b = terminalConfig.bgColor || '#18181b';
        document.documentElement.style.setProperty('--primary-color', c);
        document.documentElement.style.setProperty('--bg-color', b);
        const r = parseInt(c.slice(1,3), 16), g = parseInt(c.slice(3,5), 16), bl = parseInt(c.slice(5,7), 16);
        document.documentElement.style.setProperty('--primary-glow', `rgba(${r}, ${g}, ${bl}, 0.15)`);
    }

    if ('getBattery' in navigator) {
        navigator.getBattery().then(bat => {
            const up = () => { document.getElementById('battery-level').textContent = Math.round(bat.level * 100) + "%"; };
            up(); bat.onlevelchange = up;
        });
    }

    window.pressKey = (key) => {
        playBeep(600, 0.04, 0.05); if (navigator.vibrate) navigator.vibrate(20);
        if (key === 'back') { 
            if ((pdvMode === 'PAYMENT' || cartTotal > 0) && currentDigits === "") { resetApp(); return; }
            currentDigits = currentDigits.slice(0, -1); 
        } 
        else if (key === 'enter') { handleAction(); return; } 
        else {
            if (pdvMode === 'COMMAND') { if (currentDigits.length < 3) currentDigits += key; } 
            else { if (key === '0' && currentDigits === "") { resetApp(); return; } if (currentDigits.length < 8) currentDigits += key; }
        }
        updateDisplay();
    };

    function updateDisplay() {
        const vB = document.getElementById('display-value'), cB = document.getElementById('display-currency'), l = document.getElementById('instruction-label'), h = document.getElementById('back-hint');
        if (pdvMode === 'COMMAND') {
            document.getElementById('app-body').classList.remove('mode-payment'); cB.classList.add('hidden');
            vB.textContent = currentDigits || "0"; vB.className = "text-[4.5rem] font-bold tracking-tighter text-white";
            const c = currentDigits; h.style.opacity = "0";
            if (terminalConfig.shortcuts && terminalConfig.shortcuts[c]) {
                const s = terminalConfig.shortcuts[c]; l.textContent = `ADD: ${s.desc.toUpperCase()}`; vB.classList.add('text-primary');
            } else if (c === '' || c === '0') { l.textContent = cartTotal > 0 ? "ENTER FINALIZA" : "ENTER VENDA MANUAL"; }
            else l.textContent = "CÓDIGO PDV";
            if (cartTotal > 0 && currentDigits === "") { h.textContent = "Apagar p/ Limpar"; h.style.opacity = "1"; }
        } else {
            document.getElementById('app-body').classList.add('mode-payment'); cB.classList.remove('hidden');
            const v = currentDigits === "" ? 0 : parseInt(currentDigits);
            vB.textContent = (v / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            vB.className = "text-[3.5rem] font-black tracking-tighter text-primary";
            l.textContent = "VALOR MANUAL"; h.style.opacity = (currentDigits === "") ? "1" : "0";
        }
    }

    function handleAction() {
        if (pdvMode === 'COMMAND') {
            const code = currentDigits === "" ? "0" : currentDigits; currentDigits = "";
            if (terminalConfig.shortcuts && terminalConfig.shortcuts[code]) {
                const s = terminalConfig.shortcuts[code];
                if (s.type === 'venda') {
                    cartTotal += parseFloat(s.value); cartItems.push({ desc: s.desc, amount: parseFloat(s.value) });
                    playBeep(880, 0.1, 0.2); updateCartUI(); updateDisplay(); return;
                } else {
                    if (s.funcType === 'wifi') showWifi(s.ssid, s.pass);
                    else if (s.funcType === 'contato') showSupport(s.whatsapp);
                    else if (s.funcType === 'config') toggleSettings();
                    else if (s.funcType === 'caixa') { document.getElementById('view-closing').classList.remove('hidden'); renderSales(); }
                    return;
                }
            }
            if (code === '0') { if (cartTotal > 0) { processSalePIX(cartTotal); } else { pdvMode = 'PAYMENT'; playBeep(880, 0.1); } }
            else playBeep(150, 0.2); updateDisplay();
        } else {
            const v = currentDigits === "" ? 0 : parseInt(currentDigits);
            if (v <= 0) return;
            const a = v / 100; cartItems.push({ desc: "Venda Manual", amount: a });
            cartTotal += a; processSalePIX(cartTotal);
        }
    }

    function updateCartUI() {
        const b = document.getElementById('main-total-badge'), vE = document.getElementById('main-cart-total-val'), l = document.getElementById('main-cart-list');
        if (cartTotal > 0) {
            b.style.opacity = "1"; b.style.transform = "scale(0.85)"; vE.textContent = cartTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            l.innerHTML = cartItems.slice(-3).map(i => `<div class="item-row flex justify-between items-center text-[7px] font-bold uppercase tracking-widest text-primary/80 truncate"><span>${i.desc}</span><span>R$ ${i.amount.toFixed(2)}</span></div>`).join('');
        } else { b.style.opacity = "0"; b.style.transform = "scale(0.7)"; l.innerHTML = ""; }
    }

    async function processSalePIX(amount) {
        document.getElementById('view-pix').classList.remove('hidden');
        document.getElementById('pix-amount-label').textContent = amount.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const txId = "TX_" + Date.now();
        const txRef = ref(db, `artifacts/${safeAppId}/public/data/transactions/${txId}`);
        set(txRef, { status: 'pendente', amount: amount });
        unsubscribePayment = onValue(txRef, (snap) => { if (snap.val()?.status === 'pago') registerSale(amount); });
        lastPixString = "00020101021126580014BR.GOV.BCB.PIX0136"+(terminalConfig.pixKey || "pix")+"52040000530398654"+amount.toFixed(2).length.toString().padStart(2,'0')+amount.toFixed(2)+"5802BR5903PDV6009SAO PAULO62070503***6304";
        document.getElementById('pix-qr-box').innerHTML = "";
        new QRCode(document.getElementById('pix-qr-box'), { text: lastPixString, width: 250, height: 250, correctLevel: QRCode.CorrectLevel.M });
    }

    window.copyPixCode = () => { const e = document.createElement('textarea'); e.value = lastPixString; document.body.appendChild(e); e.select(); document.execCommand('copy'); document.body.removeChild(e); showMessage("PIX Copiado!"); };

    function registerSale(amount) {
        push(ref(db, `artifacts/${safeAppId}/public/data/sales`), { amount: amount, timestamp: new Date().toISOString(), items: cartItems });
        confetti({ particleCount: 100, spread: 50, origin: { y: 0.3 } });
        document.querySelectorAll('.view-overlay').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-success').classList.replace('hidden', 'flex');
        cartTotal = 0; cartItems = []; updateCartUI(); setTimeout(resetApp, 2500);
    }

    window.addShortcutUI = () => { renderShortcutRow(Date.now(), null, true); };
    function renderShortcutRow(id, s, isEdit) {
        const container = document.getElementById('shortcuts-config-list');
        if (isEdit) {
            const h = `<div class="shortcut-item shortcut-edit-mode" id="sc-${id}"><div class="grid grid-cols-7 gap-2 items-center mb-2"><input type="text" placeholder="CÓD" class="col-span-1 minimal-input text-center text-primary font-black" data-key="trigger" value="${s ? s.trigger : ''}"><select class="col-span-2 minimal-input text-[8px] font-bold" data-key="type" onchange="updateShortcutFields('${id}')"><option value="venda" ${s?.type === 'venda' ? 'selected' : ''}>Venda</option><option value="funcao" ${s?.type === 'funcao' ? 'selected' : ''}>Função</option></select><input type="text" placeholder="DESC" class="col-span-3 minimal-input text-[9px]" data-key="desc" value="${s ? s.desc : ''}"><button onclick="document.getElementById('sc-${id}').remove()" class="col-span-1 text-red-500/50 flex justify-center"><i data-lucide="trash-2" size="14"></i></button></div><div id="fields-${id}" class="grid grid-cols-1 gap-2 bg-white/5 p-2 rounded-xl"></div></div>`;
            const tD = document.createElement('div'); tD.innerHTML = h;
            const ex = document.getElementById(`sc-${id}`);
            if (ex) container.replaceChild(tD.firstElementChild, ex); else container.insertAdjacentElement('beforeend', tD.firstElementChild);
            updateShortcutFields(id, s);
        } else {
            const tL = s.type === 'venda' ? `R$ ${parseFloat(s.value).toFixed(2)}` : (s.funcType || 'Função').toUpperCase();
            const h = `<div class="shortcut-item shortcut-view-mode" id="sc-${id}" onclick="switchShortcutToEdit('${id}', ${JSON.stringify(s).replace(/"/g, '&quot;')})"><div class="flex items-center gap-2"><div class="w-6 h-6 rounded bg-primary/10 flex items-center justify-center text-primary font-black text-[9px] border border-primary/20">${s.trigger}</div><div class="flex flex-col"><span class="text-[8px] font-bold text-white uppercase">${s.desc}</span><span class="text-[6px] text-zinc-500 uppercase tracking-widest">${s.type}</span></div></div><div class="text-[7px] font-black text-primary/80 bg-primary/5 px-2 py-0.5 rounded border border-primary/10">${tL}</div><input type="hidden" data-key="trigger" value="${s.trigger}"><input type="hidden" data-key="type" value="${s.type}"><input type="hidden" data-key="desc" value="${s.desc}"><div class="hidden" id="fields-${id}"></div></div>`;
            const tD = document.createElement('div'); tD.innerHTML = h;
            const ex = document.getElementById(`sc-${id}`);
            if (ex) container.replaceChild(tD.firstElementChild, ex); else container.insertAdjacentElement('beforeend', tD.firstElementChild);
            const f = document.getElementById(`fields-${id}`);
            if (s.type === 'venda') f.innerHTML = `<input type="hidden" data-key="value" value="${s.value}">`;
            else f.innerHTML = `<input type="hidden" data-key="funcType" value="${s.funcType}"><input type="hidden" data-key="ssid" value="${s.ssid || ''}"><input type="hidden" data-key="pass" value="${s.pass || ''}"><input type="hidden" data-key="whatsapp" value="${s.whatsapp || ''}">`;
        }
        lucide.createIcons();
    }

    window.switchShortcutToEdit = (id, data) => { renderShortcutRow(id, { ...data, trigger: data.trigger }, true); };
    window.updateShortcutFields = (id, ex = null) => {
        const c = document.getElementById(`fields-${id}`); const t = document.querySelector(`#sc-${id} [data-key="type"]`).value;
        if (!c) return; c.innerHTML = "";
        if (t === 'venda') c.innerHTML = `<input type="number" placeholder="VALOR R$" class="minimal-input text-[8px]" data-key="value" value="${ex?.value || ''}">`;
        else {
            c.innerHTML = `<select class="minimal-input text-[7px] mb-1" data-key="funcType" onchange="updateFunctionSubFields('${id}')"><option value="">Função...</option><option value="wifi" ${ex?.funcType === 'wifi' ? 'selected' : ''}>Wi-Fi</option><option value="contato" ${ex?.funcType === 'contato' ? 'selected' : ''}>Contacto</option><option value="config" ${ex?.funcType === 'config' ? 'selected' : ''}>Ajustes</option><option value="caixa" ${ex?.funcType === 'caixa' ? 'selected' : ''}>Caixa</option></select><div id="subfields-${id}" class="space-y-1"></div>`;
            updateFunctionSubFields(id, ex);
        }
    };
    window.updateFunctionSubFields = (id, ex = null) => {
        const s = document.getElementById(`subfields-${id}`); if (!s) return;
        const f = document.querySelector(`#sc-${id} [data-key="funcType"]`).value; s.innerHTML = "";
        if (f === 'wifi') s.innerHTML = `<input type="text" placeholder="SSID" class="minimal-input text-[8px]" data-key="ssid" value="${ex?.ssid || ''}"><input type="text" placeholder="SENHA" class="minimal-input text-[8px]" data-key="pass" value="${ex?.pass || ''}">`;
        else if (f === 'contato') s.innerHTML = `<input type="text" placeholder="WHATSAPP" class="minimal-input text-[8px]" data-key="whatsapp" value="${ex?.whatsapp || ''}">`;
    };

    window.resetApp = () => { 
        if(unsubscribePayment) unsubscribePayment(); 
        document.querySelectorAll('.view-overlay').forEach(v => { v.classList.add('hidden'); v.classList.remove('flex'); }); 
        pdvMode = 'COMMAND'; currentDigits = ""; cartTotal = 0; cartItems = []; updateCartUI(); updateDisplay(); 
    };

    window.toggleSettings = () => {
        const v = document.getElementById('view-settings');
        if(v.classList.contains('hidden')) {
            const sV = (id, val) => { const el = document.getElementById(id); if(el) el.value = val || ""; };
            sV('input-terminal-name', terminalConfig.terminalName); sV('input-daily-goal', terminalConfig.dailyGoal);
            sV('input-pix-key', terminalConfig.pixKey); sV('input-api-key', terminalConfig.mpApiKey);
            sV('input-whatsapp', terminalConfig.whatsapp); sV('input-wifi-ssid', terminalConfig.wifiSSID); sV('input-wifi-pass', terminalConfig.wifiPass);
            const sS = (id, val) => { const el = document.getElementById(id); if(el) el.value = val; };
            sS('input-bg', terminalConfig.bgColor); sS('input-color', terminalConfig.color); sS('input-kb-type', terminalConfig.kbType);
            renderShortcutsConfig(); v.classList.remove('hidden');
        } else v.classList.add('hidden');
    };
    
    window.saveSettings = async () => {
        const shortcuts = {};
        document.querySelectorAll('.shortcut-item').forEach(item => {
            const t = item.querySelector('[data-key="trigger"]')?.value;
            const type = item.querySelector('[data-key="type"]')?.value;
            const desc = item.querySelector('[data-key="desc"]')?.value;
            if (t) {
                const s = { type, desc };
                if (type === 'venda') { s.value = parseFloat(item.querySelector('[data-key="value"]')?.value || 0); }
                else {
                    s.funcType = item.querySelector('[data-key="funcType"]')?.value;
                    if (s.funcType === 'wifi') { s.ssid = item.querySelector('[data-key="ssid"]')?.value; s.pass = item.querySelector('[data-key="pass"]')?.value; }
                    else if (s.funcType === 'contato') { s.whatsapp = item.querySelector('[data-key="whatsapp"]')?.value; }
                }
                shortcuts[t] = s;
            }
        });
        const gV = (id) => document.getElementById(id)?.value || "";
        const cfg = { ...terminalConfig, terminalName: gV('input-terminal-name'), dailyGoal: parseFloat(gV('input-daily-goal')) || 0, pixKey: gV('input-pix-key'), mpApiKey: gV('input-api-key'), whatsapp: gV('input-whatsapp'), wifiSSID: gV('input-wifi-ssid'), wifiPass: gV('input-wifi-pass'), color: gV('input-color'), bgColor: gV('input-bg'), kbType: gV('input-kb-type'), shortcuts: shortcuts };
        if (db && auth.currentUser) { await set(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main`), cfg); resetApp(); showMessage("Salvo!"); }
    };

    function updateUIFromConfig() { document.getElementById('terminal-name-label').textContent = terminalConfig.terminalName || "ONLINE"; const k = document.getElementById('virtual-keypad'); if (k) k.style.display = (terminalConfig.kbType === 'fisico') ? 'none' : 'grid'; }
    function showMessage(t) { const b = document.getElementById('message-box'); document.getElementById('message-text').textContent = t; b.style.opacity = "1"; setTimeout(() => b.style.opacity = "0", 2500); }
    
    function showWifi(ssid, pass) { document.getElementById('view-wifi').classList.replace('hidden', 'flex'); document.getElementById('wifi-ssid-val').textContent = ssid || "Rede"; document.getElementById('wifi-qr-box').innerHTML=""; new QRCode(document.getElementById('wifi-qr-box'), { text: `WIFI:S:${ssid};P:${pass};;`, width: 250, height: 250 }); }
    function showSupport(num) { document.getElementById('view-support').classList.replace('hidden', 'flex'); document.getElementById('whatsapp-num-val').textContent = num || ""; document.getElementById('whatsapp-qr').innerHTML=""; new QRCode(document.getElementById('whatsapp-qr'), { text: `https://wa.me/${num}`, width: 250, height: 250 }); }
    function renderSales() {
        const l = document.getElementById('sales-list'), pb = document.getElementById('closing-progress-bar'), pt = document.getElementById('closing-progress-text');
        if(!l) return; l.innerHTML = ""; let t = 0;
        salesData.forEach(s => { if(new Date(s.timestamp).getTime() > terminalConfig.lastClosed) { t += s.amount; l.innerHTML += `<div class="bg-white/5 p-3 rounded-xl flex justify-between"><div><p class="text-[7px] text-zinc-500 uppercase">${new Date(s.timestamp).toLocaleTimeString()}</p><p class="text-[8px] text-white font-medium truncate">${(s.items || []).map(i => i.desc).join(', ')}</p></div><span class="text-white font-bold">R$ ${s.amount.toFixed(2)}</span></div>`; } });
        document.getElementById('closing-total').textContent = t.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        const p = Math.min(100, Math.round((t / (terminalConfig.dailyGoal || 1)) * 100)); if(pb) pb.style.width = p + "%"; if(pt) pt.textContent = p + "%";
    }
    window.closeShift = () => { set(ref(db, `artifacts/${safeAppId}/public/data/terminal_settings/main/lastClosed`), Date.now()); resetApp(); showMessage("Turno Zerado"); };

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        const vM = document.querySelectorAll('.view-overlay.hidden').length === document.querySelectorAll('.view-overlay').length;
        if (e.key === 'Escape') resetApp();
        if (e.key === 'Enter' && vM) handleAction();
        if (e.key === 'Backspace' && vM) pressKey('back');
        if (e.key >= '0' && e.key <= '9' && vM) pressKey(e.key);
    });

    setInterval(() => { const d = new Date(); document.getElementById('clock').textContent = d.toLocaleTimeString('pt-BR'); }, 1000);
    window.addEventListener('load', () => { lucide.createIcons(); initFirebase(); });
</script>
</body>
</html>
